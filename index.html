kDetector.MouseClick. It also provides the clicking player as the first argument."}, {"type": "choice", "prompt": "Why use FindFirstChild instead of direct access here?", "choices": ["Faster", "Returns nil if missing, no error", "Required by Roblox", "Force of habit"], "answer": 1, "explain": "Defensive. If the player object is being set up, leaderstats might not exist yet."}], "recap": "ClickDetector.MouseClick gives you the player. Update leaderstats on the server. Use FindFirstChild for safety."}, {"id": "l93", "number": 93, "title": "Project — A Shop with a RemoteEvent", "teaches": "Real client-server purchase with server-side validation.", "idea": "Player clicks a buy button on the client. Client fires a RemoteEvent to the server with the item name. Server looks up the price (server-side), checks affordability, deducts coins, gives the item. Client never controls coins or prices.", "examples": [{"code": "-- ReplicatedStorage > BuyEvent (RemoteEvent)\n-- ServerScriptService > Shop\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal buyEvent = RS:WaitForChild(\"BuyEvent\")\n\nlocal SHOP = {\n    Sword = { Price = 50 },\n    Shield = { Price = 30 },\n    Potion = { Price = 10 },\n}\n\nbuyEvent.OnServerEvent:Connect(function(player, itemName)\n    -- Validate item exists in shop\n    local item = SHOP[itemName]\n    if not item then return end\n\n    -- Validate stats exist\n    local stats = player:FindFirstChild(\"leaderstats\")\n    local coins = stats and stats:FindFirstChild(\"Coins\")\n    if not coins then return end\n\n    -- Check affordability\n    if coins.Value < item.Price then return end\n\n    -- Deduct and give item\n    coins.Value = coins.Value - item.Price\n    print(player.Name .. \" bought \" .. itemName)\n    -- (Code to actually give the item goes here.)\nend)", "out": "(server only awards items if player can afford)"}, {"code": "-- LocalScript: client side, on a TextButton\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal buyEvent = RS:WaitForChild(\"BuyEvent\")\n\nlocal button = script.Parent  -- assuming attached to a TextButton\nbutton.MouseButton1Click:Connect(function()\n    buyEvent:FireServer(\"Sword\")\nend)", "out": "(clicking fires the buy request)"}], "why": "This is the shape of any client-driven action that changes server state. The client requests, the server decides.", "habits": ["Look up the price on the server, never trust a client-sent price.", "Check stats and inventory ownership on the server.", "Return early on bad input. Don't error or send error messages back unless your design needs them.", "If you need a result back (success/failure), use a RemoteFunction instead."], "questions": [{"type": "choice", "prompt": "Why does the client only send the item name and NOT the price?", "choices": ["Network speed", "The price is the server's responsibility — the client could lie", "Required by Roblox", "It looks cleaner"], "answer": 1, "explain": "If the client could set the price, exploiters would buy everything for 0 coins. Server owns the price table."}], "recap": "Client sends an intent. Server validates and applies. The whole transaction is server-side."}, {"id": "l94", "number": 94, "title": "Project — Touched Trap (Health Damage)", "teaches": "Part.Touched, character access, and humanoid health.", "idea": "When a player walks onto a Part, its `Touched` event fires with whatever touched it. Walk up the parent chain to find the character model, find the humanoid, find the player, debounce, apply damage.", "examples": [{"code": "-- Server: a Script inside the trap part\nlocal Players = game:GetService(\"Players\")\nlocal trap = script.Parent\n\nlocal lastDamage = {}  -- per-player cooldown\n\ntrap.Touched:Connect(function(otherPart)\n    local character = otherPart:FindFirstAncestorOfClass(\"Model\")\n    if not character then return end\n\n    local humanoid = character:FindFirstChildOfClass(\"Humanoid\")\n    if not humanoid then return end\n\n    local player = Players:GetPlayerFromCharacter(character)\n    if not player then return end\n\n    -- Simple debounce: limit to once per second per player\n    local now = tick()\n    if lastDamage[player] and now - lastDamage[player] < 1 then\n        return\n    end\n    lastDamage[player] = now\n\n    humanoid.Health = humanoid.Health - 10\nend)", "out": "(walking on the part damages the player)"}], "why": "Touched is one of the most-used events in Roblox. The walk-up-to-find-the-character pattern is the template for nearly every 'thing the player walks onto' feature.", "note": "Touched can fire many times very quickly as parts collide. A debounce (here: a per-player cooldown stored in a dictionary) prevents one walk-over from dealing 50 damage in a single second.", "questions": [{"type": "choice", "prompt": "Why use FindFirstAncestorOfClass(\"Model\") in a Touched handler?", "choices": ["Faster lookup", "The touching part might be a hand or foot — we want the whole character model", "Roblox requires it", "It's the only option"], "answer": 1, "explain": "otherPart could be any limb. Walking up to the Model gives the full character."}, {"type": "choice", "prompt": "Why debounce a Touched event?", "choices": ["For performance", "Touched fires repeatedly during contact — without debounce, damage compounds", "Just style", "Roblox requires it"], "answer": 1, "explain": "Without debounce, one second of contact can fire Touched many times, dealing way more damage than intended."}], "recap": "Touched + FindFirstAncestorOfClass + GetPlayerFromCharacter + debounce. You'll use this combination constantly."}, {"id": "l95", "number": 95, "title": "Project — Save and Load with DataStoreService", "teaches": "Persisting player data between sessions.", "idea": "DataStoreService stores data per key, persisting across server restarts. Use the player's UserId as the key. Load on PlayerAdded. Save on PlayerRemoving (and periodically, for safety). Wrap calls in pcall — DataStores can fail.", "examples": [{"code": "-- Server: ServerScriptService > DataSave\nlocal DS = game:GetService(\"DataStoreService\")\nlocal Players = game:GetService(\"Players\")\nlocal coinStore = DS:GetDataStore(\"PlayerCoins\")\n\nlocal function loadCoins(player)\n    local success, data = pcall(function()\n        return coinStore:GetAsync(player.UserId)\n    end)\n\n    if success and data then\n        return data\n    end\n    return 0  -- default\nend\n\nlocal function saveCoins(player, amount)\n    local success, err = pcall(function()\n        coinStore:SetAsync(player.UserId, amount)\n    end)\n\n    if not success then\n        warn(\"Failed to save coins for \" .. player.Name .. \": \" .. tostring(err))\n    end\nend\n\nPlayers.PlayerAdded:Connect(function(player)\n    local stats = Instance.new(\"Folder\")\n    stats.Name = \"leaderstats\"\n    stats.Parent = player\n\n    local coins = Instance.new(\"IntValue\")\n    coins.Name = \"Coins\"\n    coins.Value = loadCoins(player)\n    coins.Parent = stats\nend)\n\nPlayers.PlayerRemoving:Connect(function(player)\n    local stats = player:FindFirstChild(\"leaderstats\")\n    if not stats then return end\n    local coins = stats:FindFirstChild(\"Coins\")\n    if not coins then return end\n\n    saveCoins(player, coins.Value)\nend)", "out": "(player coins persist between sessions)"}], "why": "Persistence is what turns a Roblox prototype into a game. Players come back tomorrow and expect their progress to still be there.", "habits": ["Wrap GetAsync/SetAsync in pcall — they can fail (network, throttling).", "Have a sensible default when data doesn't exist yet.", "Use the player's UserId as the key — it never changes.", "Save on PlayerRemoving and periodically (every few minutes) so partial progress survives a disconnect.", "Don't store huge tables. DataStores have size limits. Save only the essentials.", "Test in actual servers (publish your game). DataStores behave differently in Studio."], "questions": [{"type": "choice", "prompt": "Why wrap DataStore calls in pcall?", "choices": ["Speed", "DataStore calls can fail; pcall keeps the script alive when they do", "Required by Luau", "It looks professional"], "answer": 1, "explain": "Network errors, throttling, service outages all cause SetAsync/GetAsync to fail. pcall handles the failure cleanly."}, {"type": "choice", "prompt": "Best key to use for per-player data?", "choices": ["player.Name", "player.UserId", "Random number", "tick()"], "answer": 1, "explain": "UserId is unique and permanent. Names can change."}], "recap": "GetAsync / SetAsync. UserId as the key. Always pcall. Default values for new players."}, {"id": "l96", "number": 96, "title": "Final Review — What You Know Now", "teaches": "A look back at what you've covered, and what to do next.", "idea": "You started with `print(\"Hello\")`. You now know variables, control flow, functions, tables, modules, strings, pattern matching, types, OOP, events, services, remotes, security, and the Roblox-specific APIs. That covers the core of Luau and Roblox scripting.", "examples": [{"code": "-- This is what your toolkit covers now:\n--\n-- LUAU CORE\n--   variables, math, comparisons, control flow (if, while, for, repeat)\n--   strings (concat, sub, find, format, patterns)\n--   tables (lists, named keys, nested, references, clone, sort, find)\n--   functions (parameters, return, variadic, multiple returns, closures)\n--   types (annotations, optional, union, table types, type aliases)\n--   modules, OOP with metatables, inheritance\n--   error handling (assert, pcall), debugging (print, type/typeof)\n--\n-- ROBLOX SCRIPTING\n--   server vs client (Script vs LocalScript)\n--   services and game:GetService\n--   containers (Workspace, ReplicatedStorage, ServerScriptService, ...)\n--   instances, properties, parent/children\n--   WaitForChild, FindFirstChild\n--   events: Touched, PlayerAdded, CharacterAdded, MouseClick\n--   task library (task.wait, task.spawn, task.delay)\n--   RemoteEvent, RemoteFunction, // ---------- STATE ----------
const state = {
  view: 'home',          // 'home' | 'lesson' | 'review' | 'onboarding'
  moduleId: null,
  lessonId: null,
  hoursPerDay: null,     // null = user hasn't picked a pace yet (triggers onboarding)
  done: {},              // { 'l1': true, ... }
  answered: {},          // { 'l1_q0': {correct: true, ...} }
};

// ---------- STORAGE ----------
// Uses browser localStorage. Progress persists per-device across visits.
// Falls back silently if localStorage is unavailable (e.g. private browsing).
function loadProgress() {
  try {
    const raw = localStorage.getItem('luau_codex_progress');
    if (raw) {
      const data = JSON.parse(raw);
      if (data.done) state.done = data.done;
      if (data.answered) state.answered = data.answered;
      if (data.hoursPerDay) state.hoursPerDay = data.hoursPerDay;
    }
  } catch (e) {
    // No prior progress, or storage blocked. Continue without it.
  }
}
function saveProgress() {
  try {
    localStorage.setItem('luau_codex_progress', JSON.stringify({
      done: state.done,
      answered: state.answered,
      hoursPerDay: state.hoursPerDay
    }));
  } catch (e) { /* silent — quota exceeded or storage disabled */ }
}

// ---------- PACE FORMATTING ----------
function formatPace(h) {
  if (h < 1) return Math.round(h * 60) + ' min/day';
  if (h === 1) return '1 hr/day';
  return h + ' hrs/day';
}
function paceWord(h) {
  if (h < 1) return Math.round(h * 60) + ' minutes';
  if (h === 1) return '1 hour';
  return h + ' hours';
}

// ---------- HELPERS ----------
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Simple Luau syntax highlighter (regex based, not perfect, but readable)
const LUAU_KEYWORDS = new Set([
  'local','function','end','if','then','elseif','else','for','while','do','repeat','until',
  'return','break','continue','in','and','or','not','true','false','nil','require','self',
  'type','typeof','export','as'
]);
const LUAU_BUILTINS = new Set([
  'print','warn','error','assert','pcall','xpcall','tostring','tonumber','setmetatable','getmetatable',
  'ipairs','pairs','select','table','string','math','task','coroutine','game','workspace','script',
  'Instance','Vector3','CFrame','Color3','BrickColor','TweenInfo','Enum','RunService','Players',
  'ReplicatedStorage','ServerStorage','ServerScriptService','StarterPlayer','StarterGui','UserInputService',
  'TweenService','DataStoreService','HttpService','RunService'
]);

function highlight(code) {
  // Tokenize: comments, strings, numbers, keywords, builtins, identifiers
  let out = '';
  let i = 0;
  while (i < code.length) {
    // Multi-line comment block: --[[ ... ]]
    if (code.startsWith('--[[', i)) {
      const end = code.indexOf(']]', i+4);
      const slice = end === -1 ? code.slice(i) : code.slice(i, end+2);
      out += '<span class="cm">' + escapeHtml(slice) + '</span>';
      i += slice.length;
      continue;
    }
    // Line comment
    if (code.startsWith('--', i)) {
      const nl = code.indexOf('\n', i);
      const slice = nl === -1 ? code.slice(i) : code.slice(i, nl);
      out += '<span class="cm">' + escapeHtml(slice) + '</span>';
      i += slice.length;
      continue;
    }
    // Long string [[ ... ]]
    if (code.startsWith('[[', i)) {
      const end = code.indexOf(']]', i+2);
      const slice = end === -1 ? code.slice(i) : code.slice(i, end+2);
      out += '<span class="str">' + escapeHtml(slice) + '</span>';
      i += slice.length;
      continue;
    }
    // Strings
    if (code[i] === '"' || code[i] === "'") {
      const quote = code[i];
      let j = i+1;
      while (j < code.length && code[j] !== quote) {
        if (code[j] === '\\' && j+1 < code.length) { j += 2; continue; }
        if (code[j] === '\n') break;
        j++;
      }
      const slice = code.slice(i, j+1);
      out += '<span class="str">' + escapeHtml(slice) + '</span>';
      i = j+1;
      continue;
    }
    // Numbers
    if (/\d/.test(code[i])) {
      let j = i;
      while (j < code.length && /[\d.]/.test(code[j])) j++;
      out += '<span class="num">' + escapeHtml(code.slice(i, j)) + '</span>';
      i = j;
      continue;
    }
    // Identifiers / keywords
    if (/[A-Za-z_]/.test(code[i])) {
      let j = i;
      while (j < code.length && /[A-Za-z0-9_]/.test(code[j])) j++;
      const word = code.slice(i, j);
      if (LUAU_KEYWORDS.has(word)) {
        out += '<span class="kw">' + word + '</span>';
      } else if (LUAU_BUILTINS.has(word)) {
        out += '<span class="fn">' + word + '</span>';
      } else {
        out += escapeHtml(word);
      }
      i = j;
      continue;
    }
    // Default: emit one char
    out += escapeHtml(code[i]);
    i++;
  }
  return out;
}

function findModule(id) { return CURRICULUM.modules.find(m => m.id === id); }
function findLesson(modId, lesId) {
  const m = findModule(modId);
  if (!m) return null;
  return m.lessons.find(l => l.id === lesId);
}

function lessonProgressKey(lessonId) { return lessonId; }

function countLessonsDone() { return Object.keys(state.done).filter(k => state.done[k]).length; }
function totalLessons() { return CURRICULUM.totalLessons; }

function updateProgress() {
  const done = countLessonsDone();
  const total = totalLessons();
  document.getElementById('progressText').textContent = done + ' of ' + total + ' lessons';
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

// ---------- NAVIGATION RENDER ----------
function renderNav() {
  const nav = document.getElementById('nav');
  let html = '';
  for (const m of CURRICULUM.modules) {
    const isOpen = (state.moduleId === m.id);
    html += '<div class="nav-section">';
    html += '<div class="nav-module ' + (isOpen ? 'open' : '') + '" data-mod="' + m.id + '">';
    html += '<span class="nav-module-num">' + m.number + '</span>';
    html += '<span class="nav-module-title">' + escapeHtml(m.title) + '</span>';
    html += '<span class="nav-module-caret">›</span>';
    html += '</div>';
    html += '<div class="nav-lessons">';
    for (const l of m.lessons) {
      const doneCls = state.done[l.id] ? ' done' : '';
      const activeCls = (state.view === 'lesson' && state.lessonId === l.id) ? ' active' : '';
      html += '<div class="nav-lesson' + doneCls + activeCls + '" data-mod="' + m.id + '" data-les="' + l.id + '">';
      html += '<span class="nav-lesson-num">' + l.number + '.</span>' + escapeHtml(l.title);
      html += '</div>';
    }
    if (m.review) {
      const activeCls = (state.view === 'review' && state.moduleId === m.id) ? ' active' : '';
      html += '<div class="nav-review' + activeCls + '" data-mod="' + m.id + '" data-rev="1">';
      html += escapeHtml(m.review.title);
      html += '</div>';
    }
    html += '</div></div>';
  }
  nav.innerHTML = html;

  nav.querySelectorAll('.nav-module').forEach(el => {
    el.addEventListener('click', () => {
      const modId = el.dataset.mod;
      if (state.moduleId === modId && state.view !== 'home') {
        // Toggle close
        state.moduleId = null;
        renderNav();
      } else {
        state.moduleId = modId;
        renderNav();
      }
    });
  });

// ---------- LESSON RENDER ----------
function renderLesson(modId, lesId) {
  const m = findModule(modId);
  const l = findLesson(modId, lesId);
  if (!l) return;

  let html = '<article class="lesson">';
  html += '<header class="lesson-header">';
  html += '<div class="lesson-meta">Module ' + m.number + ' · Lesson ' + l.number + '</div>';
  html += '<h1 class="lesson-title">' + escapeHtml(l.title) + '</h1>';
  html += '<p class="lesson-teaches">' + escapeHtml(l.teaches) + '</p>';
  html += '</header>';

  // Main idea
  html += '<div class="section"><div class="section-label">The idea</div>';
  html += '<p>' + renderInlineCode(l.idea) + '</p></div>';

  // Examples
  if (l.examples && l.examples.length) {
    html += '<div class="section"><div class="section-label">Examples</div>';
    for (const ex of l.examples) {
      html += '<div class="example-pair">';
      html += '<div class="code-block">' + highlight(ex.code) + '</div>';
      if (ex.out !== undefined && ex.out !== null && ex.out !== '') {
        html += '<div class="output"><div class="output-label">output</div>' + escapeHtml(ex.out) + '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }

  // Why it matters
  if (l.why) {
    html += '<div class="section"><div class="section-label">Why this matters</div>';
    html += '<p>' + renderInlineCode(l.why) + '</p></div>';
  }

  // Note
  if (l.note) {
    html += '<div class="note">' + renderInlineCode(l.note) + '</div>';
  }

  // Patterns / habits / anatomy / method / ref bullet lists
  for (const key of ['patterns','habits','anatomy','method','ref']) {
    if (l[key]) {
      if (Array.isArray(l[key])) {
        const labels = { patterns: 'Pattern reference', habits: 'Good habits', anatomy: 'Anatomy', method: 'The method', ref: 'Quick reference' };
        html += '<div class="section"><div class="section-label">' + labels[key] + '</div><ul>';
        for (const item of l[key]) html += '<li>' + renderInlineCode(item) + '</li>';
        html += '</ul></div>';
      } else {
        html += '<div class="note"><strong>Source:</strong> ' + renderInlineCode(l[key]) + '</div>';
      }
    }
  }

  // Practice questions
  if (l.questions && l.questions.length) {
    html += '<div class="section"><div class="section-label">Practice</div>';
    l.questions.forEach((q, idx) => {
      const qid = l.id + '_q' + idx;
      html += renderQuestion(q, qid, l.questions.length, idx + 1);
    });
    html += '</div>';
  }

  // Recap
  if (l.recap) {
    html += '<div class="recap"><div class="recap-label">Recap</div><div class="recap-text">' + renderInlineCode(l.recap) + '</div></div>';
  }

  // Sources footer
  html += renderSourcesFooter(l);

  // Foot navigation
  const allLessons = [];
  for (const mm of CURRICULUM.modules) {
    for (const ll of mm.lessons) allLessons.push({ mod: mm.id, les: ll.id });
    if (mm.review) allLessons.push({ mod: mm.id, review: true });
  }
  const idxNow = allLessons.findIndex(x => x.les === lesId);
  const prev = idxNow > 0 ? allLessons[idxNow - 1] : null;
  const next = idxNow < allLessons.length - 1 ? allLessons[idxNow + 1] : null;

  const doneClass = state.done[l.id] ? ' done' : '';
  html += '<div class="lesson-foot">';
  html += '<div>' + (prev ? '<button type="button" class="foot-btn" id="prevBtn">← Previous</button>' : '') + '</div>';
  html += '<div class="mark-done' + doneClass + '" id="markDone">' + (state.done[l.id] ? 'Marked as complete' : 'Mark as complete') + '</div>';
  html += '<div>' + (next ? '<button type="button" class="foot-btn primary" id="nextBtn">' + (next.review ? 'To checkpoint →' : 'Next lesson →') + '</button>' : '') + '</div>';
  html += '</div>';

  html += '</article>';
  document.getElementById('main').innerHTML = html;
  window.scrollTo(0, 0);

  attachQuestionHandlers(l.id);

  document.getElementById('markDone').addEventListener('click', () => {
    state.done[l.id] = !state.done[l.id];
    saveProgress();
    updateProgress();
    renderNav();
    const el = document.getElementById('markDone');
    el.classList.toggle('done');
    el.textContent = state.done[l.id] ? 'Marked as complete' : 'Mark as complete';
  });

  if (prev) {
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (prev.review) openReview(prev.mod);
      else openLesson(prev.mod, prev.les);
    });
  }
  if (next) {
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (next.review) openReview(next.mod);
      else openLesson(next.mod, next.les);
    });
  }
}

// Render inline `code` markdown in text, and auto-linkify Roblox source URLs
function renderInlineCode(text) {
  if (!text) return '';
  // First escape HTML
  const escaped = escapeHtml(text);
  // Linkify Roblox source URLs (devforum.roblox.com/..., create.roblox.com/..., luau.org/...)
  const linked = escaped.replace(
    /\b(devforum\.roblox\.com|create\.roblox\.com|luau\.org)\/[^\s'"\u2014<>]+/g,
    function(match) {
      const clean = match.replace(/[.,;:]+$/, '');
      const trailing = match.slice(clean.length);
      return '<a href="https://' + clean + '" target="_blank" rel="noopener" class="ref-link">' + clean + '</a>' + trailing;
    }
  );
  // Then backtick-wrapped to inline code, and newlines to <br>
  return linked.replace(/`([^`]+)`/g, '<code class="inline">$1</code>')
               .replace(/\n/g, '<br>');
}

// Pull a single source URL out of any of the lesson's prose fields
function extractSourceUrl(lesson) {
  if (!lesson) return null;
  const fields = ['ref', 'note', 'why', 'idea'];
  for (const f of fields) {
    const text = lesson[f];
    if (typeof text === 'string') {
      const m = text.match(/(devforum\.roblox\.com|create\.roblox\.com|luau\.org)\/[^\s'"\u2014<>]+/);
      if (m) return m[0].replace(/[.,;:]+$/, '');
    }
  }
  return null;
}

// Build the sources footer shown on every lesson and review page
function renderSourcesFooter(lesson) {
  const specificUrl = extractSourceUrl(lesson);
  let html = '<div class="lesson-sources">';
  html += '<div class="sources-label">Sources</div>';
  if (specificUrl) {
    html += '<div class="sources-specific">';
    html += '<span class="sources-tag">For this lesson:</span>';
    html += '<a href="https://' + specificUrl + '" target="_blank" rel="noopener">' + specificUrl + '</a>';
    html += '</div>';
  }
  html += '<div class="sources-general">';
  html += '<a href="https://create.roblox.com/docs" target="_blank" rel="noopener">Roblox Creator Hub</a>';
  html += '<a href="https://luau.org/" target="_blank" rel="noopener">Luau Reference</a>';
  html += '<a href="https://devforum.roblox.com/" target="_blank" rel="noopener">Developer Forum</a>';
  html += '</div>';
  html += '</div>';
  return html;
}

// ---------- QUESTION RENDER ----------
function renderQuestion(q, qid, totalQ, qNum) {
  const saved = state.answered[qid];
  let html = '<div class="practice-block" data-qid="' + qid + '">';
  html += '<div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0;">';
  html += '<div class="practice-label">Question ' + qNum + ' of ' + totalQ + '</div>';
  html += '</div>';
  html += '<div class="practice-prompt">' + renderInlineCode(q.prompt) + '</div>';

  if (q.code) {
    html += '<div class="practice-code">' + highlight(q.code) + '</div>';
  }

  if (q.type === 'predict') {
    const lockedAttr = saved ? ' disabled class="practice-input locked"' : ' class="practice-input"';
    const valText = saved ? escapeHtml(saved.userAnswer || '') : '';
    html += '<textarea' + lockedAttr + ' rows="2" placeholder="Type your answer. Use Enter for new lines. Click Check when done." autocomplete="off" spellcheck="false">' + valText + '</textarea>';
    html += '<div class="practice-actions">';
    if (!saved) html += '<button type="button" class="practice-btn" data-action="check">Check</button>';
    else html += '<button type="button" class="practice-btn secondary" data-action="retry">Try again</button>';
    html += '</div>';
  } else if (q.type === 'choice') {
    html += '<div class="choices">';
    for (let i = 0; i < q.choices.length; i++) {
      const c = q.choices[i];
      let cls = 'choice';
      if (saved) {
        cls += ' locked';
        if (i === q.answer) cls += ' correct';
        else if (i === saved.userAnswer) cls += ' wrong';
        else cls += ' muted';
      }
      html += '<button type="button" class="' + cls + '" data-choice="' + i + '">';
      html += '<span class="marker">' + String.fromCharCode(65 + i) + '.</span>';
      html += renderInlineCode(c);
      html += '</button>';
    }
    html += '</div>';
    if (saved) {
      html += '<div class="practice-actions"><button type="button" class="practice-btn secondary" data-action="retry">Try again</button></div>';
    }
  }

  if (saved) {
    const cls = saved.correct ? 'good' : 'bad';
    const head = saved.correct ? 'Correct' : 'Not quite';
    html += '<div class="feedback show ' + cls + '">';
    html += '<div class="feedback-head">' + head + '</div>';
    html += '<div class="feedback-body">' + renderInlineCode(q.explain || '') + '</div>';
    html += '</div>';
  } else {
    html += '<div class="feedback" id="' + qid + '_fb"></div>';
  }

  html += '</div>';
  return html;
}

function attachQuestionHandlers(lessonId) {
  document.querySelectorAll('.practice-block').forEach(block => {
    const qid = block.dataset.qid;
    const lesson = findLessonByQid(qid);
    if (!lesson) return;
    const qIndex = parseInt(qid.split('_q')[1], 10);
    const q = lesson.questions[qIndex];
    attachOneQuestionHandlers(block, qid, q);
  });
}

function rerenderLesson() {
  if (state.view === 'lesson') renderLesson(state.moduleId, state.lessonId);
  else if (state.view === 'review') renderReview(state.moduleId);
}

function findLessonByQid(qid) {
  const lessonId = qid.split('_q')[0];
  // Could be in any module. Find it.
  for (const m of CURRICULUM.modules) {
    for (const l of m.lessons) if (l.id === lessonId) return l;
    if (m.review && (lessonId === m.id + '_review')) return { id: lessonId, questions: m.review.questions };
  }
  return null;
}

function normalizeAnswer(s) {
  return String(s).trim().replace(/\r\n/g, '\n').replace(/\s+/g, ' ').toLowerCase();
}

function handlePredictCheck(qid, q, userVal) {
  const userNorm = normalizeAnswer(userVal);
  const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
  // Compare both with normalized whitespace
  let correct = false;
  for (const a of answers) {
    const aNorm = normalizeAnswer(a);
    if (userNorm === aNorm) { correct = true; break; }
    // Also try without spaces at all (forgiving for tab-separated outputs)
    if (userNorm.replace(/\s/g,'') === aNorm.replace(/\s/g,'')) { correct = true; break; }
  }
  state.answered[qid] = { correct, userAnswer: userVal };
  saveProgress();
  updateQuestionBlock(qid);
  checkLessonCompletion(qid);
}

function handleChoiceCheck(qid, q, choiceIdx) {
  const correct = (choiceIdx === q.answer);
  state.answered[qid] = { correct, userAnswer: choiceIdx };
  saveProgress();
  updateQuestionBlock(qid);
  checkLessonCompletion(qid);
}

// If every question in the lesson now has a correct saved answer, mark the lesson done.
// Once marked done, never auto-unmark (retrying a question and getting it wrong won't undo completion).
// Review checkpoints are skipped — only real lessons auto-complete.
function checkLessonCompletion(qid) {
  if (qid.indexOf('_review_') !== -1) return;
  const lessonId = qid.split('_q')[0];
  if (state.done[lessonId]) return; // already complete; skip

  let lesson = null;
  for (const m of CURRICULUM.modules) {
    for (const l of m.lessons) {
      if (l.id === lessonId) { lesson = l; break; }
    }
    if (lesson) break;
  }
  if (!lesson || !lesson.questions || lesson.questions.length === 0) return;

  const allCorrect = lesson.questions.every((_, idx) => {
    const saved = state.answered[lesson.id + '_q' + idx];
    return saved && saved.correct;
  });

  if (allCorrect) {
    state.done[lesson.id] = true;
    saveProgress();
    updateProgress();
    renderNav();
    // Sync the Mark as Complete button if we're currently viewing this lesson
    const markEl = document.getElementById('markDone');
    if (markEl) {
      markEl.classList.add('done');
      markEl.textContent = 'Marked as complete';
    }
  }
}

// Update one question's DOM block in place (no full re-render, no scroll jump).
function updateQuestionBlock(qid) {
  const block = document.querySelector('[data-qid="' + qid + '"]');
  if (!block) return;

  // Find the question definition and its index/total
  let q = null, qNum = 0, totalQ = 0;

  // Format A: lesson question, qid is like "l5_q2"
  // Format B: review question, qid is like "m1_review_q2"
  if (qid.indexOf('_review_q') !== -1) {
    const modId = qid.split('_review_q')[0];
    const idx = parseInt(qid.split('_review_q')[1], 10);
    const mod = findModule(modId);
    if (mod && mod.review) {
      q = mod.review.questions[idx];
      qNum = idx + 1;
      totalQ = mod.review.questions.length;
    }
  } else {
    const lessonId = qid.split('_q')[0];
    const idx = parseInt(qid.split('_q')[1], 10);
    // Search every module for the lesson
    outer: for (const m of CURRICULUM.modules) {
      for (const l of m.lessons) {
        if (l.id === lessonId) {
          q = l.questions[idx];
          qNum = idx + 1;
          totalQ = l.questions.length;
          break outer;
        }
      }
    }
  }

  if (!q) return;

  // Build replacement HTML and swap it in
  const newHtml = renderQuestion(q, qid, totalQ, qNum);
  const wrap = document.createElement('div');
  wrap.innerHTML = newHtml;
  const newBlock = wrap.firstElementChild;
  block.parentNode.replaceChild(newBlock, block);

  // Re-attach handlers ONLY for this question
  attachOneQuestionHandlers(newBlock, qid, q);

  // If we're showing review-page score, refresh the score line
  if (qid.indexOf('_review_q') !== -1) {
    updateReviewScore(qid.split('_review_q')[0]);
  }
}

function updateReviewScore(modId) {
  const m = findModule(modId);
  if (!m || !m.review) return;
  let answered = 0, correct = 0;
  m.review.questions.forEach((_, idx) => {
    const qid = m.id + '_review_q' + idx;
    if (state.answered[qid]) {
      answered++;
      if (state.answered[qid].correct) correct++;
    }
  });
  const scoreEl = document.getElementById('reviewScore');
  if (!scoreEl) return;
  if (answered === m.review.questions.length) {
    let msg = ' — solid. Move on.';
    if (correct < m.review.questions.length) {
      if (correct >= m.review.questions.length * 0.7) msg = ' — good. Revisit the lessons where you missed before moving forward.';
      else msg = ' — go back through this module before continuing. The next module builds on these ideas.';
    }
    scoreEl.innerHTML = 'Score: <span class="num">' + correct + ' / ' + m.review.questions.length + '</span>' + msg;
  } else {
    scoreEl.innerHTML = 'Progress: <span class="num">' + answered + ' / ' + m.review.questions.length + '</span> answered';
  }
}

// Attach handlers to a single question block (after partial re-render).
function attachOneQuestionHandlers(block, qid, q) {
  if (q.type === 'predict') {
    const input = block.querySelector('.practice-input');
    const checkBtn = block.querySelector('[data-action="check"]');
    const retryBtn = block.querySelector('[data-action="retry"]');
    // No Enter-to-submit. Enter inside the textarea adds a newline. The Check button is the only submit path.
    if (checkBtn) {
      checkBtn.addEventListener('click', (e) => {
        e.preventDefault();
        handlePredictCheck(qid, q, input ? input.value : '');
      });
    }
    if (retryBtn) {
      retryBtn.addEventListener('click', (e) => {
        e.preventDefault();
        delete state.answered[qid];
        saveProgress();
        updateQuestionBlock(qid);
        // Focus the input after the retry rebuild
        const newBlock = document.querySelector('[data-qid="' + qid + '"]');
        if (newBlock) {
          const newInput = newBlock.querySelector('.practice-input');
          if (newInput) newInput.focus();
        }
      });
    }
  } else if (q.type === 'choice') {
    const buttons = block.querySelectorAll('.choice');
    const retryBtn = block.querySelector('[data-action="retry"]');
    buttons.forEach(btn => {
      if (btn.classList.contains('locked')) return;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const choiceIdx = parseInt(btn.dataset.choice, 10);
        handleChoiceCheck(qid, q, choiceIdx);
      });
    });
    if (retryBtn) {
      retryBtn.addEventListener('click', (e) => {
        e.preventDefault();
        delete state.answered[qid];
        saveProgress();
        updateQuestionBlock(qid);
      });
    }
  }
}

// ---------- REVIEW RENDER ----------
function renderReview(modId) {
  const m = findModule(modId);
  if (!m || !m.review) return;

  // Count score
  let answered = 0, correct = 0;
  m.review.questions.forEach((q, idx) => {
    const qid = m.id + '_review_q' + idx;
    if (state.answered[qid]) {
      answered++;
      if (state.answered[qid].correct) correct++;
    }
  });

  let html = '<div class="review-page">';
  html += '<div class="review-eyebrow">Module ' + m.number + ' Review</div>';
  html += '<h1 class="review-title">' + escapeHtml(m.review.title) + '</h1>';
  html += '<p class="review-blurb">' + renderInlineCode(m.review.blurb) + '</p>';

  if (answered === m.review.questions.length) {
    html += '<div class="review-score" id="reviewScore">Score: <span class="num">' + correct + ' / ' + m.review.questions.length + '</span>';
    if (correct === m.review.questions.length) html += ' — solid. Move on.';
    else if (correct >= m.review.questions.length * 0.7) html += ' — good. Revisit the lessons where you missed before moving forward.';
    else html += ' — go back through this module before continuing. The next module builds on these ideas.';
    html += '</div>';
  } else {
    html += '<div class="review-score" id="reviewScore">Progress: <span class="num">' + answered + ' / ' + m.review.questions.length + '</span> answered</div>';
  }

  m.review.questions.forEach((q, idx) => {
    const qid = m.id + '_review_q' + idx;
    html += renderQuestion(q, qid, m.review.questions.length, idx + 1);
  });

  // Sources footer (no lesson-specific URL on review pages)
  html += renderSourcesFooter(null);

  // Foot navigation
  const allLessons = [];
  for (const mm of CURRICULUM.modules) {
    for (const ll of mm.lessons) allLessons.push({ mod: mm.id, les: ll.id });
    if (mm.review) allLessons.push({ mod: mm.id, review: true });
  }
  const idxNow = allLessons.findIndex(x => x.review && x.mod === modId);
  const prev = idxNow > 0 ? allLessons[idxNow - 1] : null;
  const next = idxNow < allLessons.length - 1 ? allLessons[idxNow + 1] : null;

  html += '<div class="lesson-foot">';
  html += '<div>' + (prev ? '<button type="button" class="foot-btn" id="prevBtn">← Previous</button>' : '') + '</div>';
  html += '<div></div>';
  html += '<div>' + (next ? '<button type="button" class="foot-btn primary" id="nextBtn">Next →</button>' : '<button type="button" class="foot-btn" id="homeBtn">Back to start</button>') + '</div>';
  html += '</div>';

  html += '</div>';
  document.getElementById('main').innerHTML = html;
  window.scrollTo(0, 0);

  // Wire review-question handlers (using the same in-place machinery as lesson questions)
  document.querySelectorAll('.practice-block').forEach(block => {
    const qid = block.dataset.qid;
    const qIndex = parseInt(qid.split('_q').pop(), 10);
    const q = m.review.questions[qIndex];
    attachOneQuestionHandlers(block, qid, q);
  });

  if (prev) {
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (prev.review) openReview(prev.mod);
      else openLesson(prev.mod, prev.les);
    });
  }
  if (next) {
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (next.review) openReview(next.mod);
      else openLesson(next.mod, next.les);
    });
  } else {
    const hb = document.getElementById('homeBtn');
    if (hb) hb.addEventListener('click', () => openHome());
  }
}

// ---------- NAVIGATION ACTIONS ----------
function openHome() {
  document.body.classList.remove('onboarding');
  state.view = 'home';
  state.moduleId = null;
  state.lessonId = null;
  renderHome();
  renderNav();
}

function openLesson(modId, lesId) {
  document.body.classList.remove('onboarding');
  state.view = 'lesson';
  state.moduleId = modId;
  state.lessonId = lesId;
  renderLesson(modId, lesId);
  renderNav();
}

function openReview(modId) {
  document.body.classList.remove('onboarding');
  state.view = 'review';
  state.moduleId = modId;
  state.lessonId = null;
  renderReview(modId);
  renderNav();
}

document.getElementById('brand').addEventListener('click', () => {
  // Brand click should not break out of onboarding (the user hasn't picked yet).
  if (!state.hoursPerDay) return;
  openHome();
});

// ---------- INIT ----------
(function init() {
  loadProgress();
  updateProgress();
  if (!state.hoursPerDay) {
    renderOnboarding();
  } else {
    renderHome();
    renderNav();
  }
})();
</script>
</body>
</html>
