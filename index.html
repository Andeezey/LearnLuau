<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="favicon.png">
<title>The Luau Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF6EE;
  --bg-deeper: #F2EBDB;
  --paper: #FFFCF4;
  --ink: #2A2520;
  --ink-soft: #4D453C;
  --ink-faint: #8A7E70;
  --rule: #DDD2BC;
  --rule-strong: #BFB39B;
  --accent: #B14F2B;
  --accent-soft: #E08760;
  --good: #3D6B3A;
  --good-soft: #DCEBD7;
  --bad: #9A4426;
  --bad-soft: #F0DBCB;
  --code-bg: #2A2520;
  --code-text: #F2EBDB;
  --code-comment: #8A7E70;
  --code-string: #E0B870;
  --code-keyword: #E08760;
  --code-number: #C7B8FF;
  --code-fn: #F4D29B;
  --code-output: #6FB872;
  --sans: 'Fraunces', Georgia, serif;
  --body: 'Newsreader', 'Iowan Old Style', Georgia, serif;
  --mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: var(--bg); color: var(--ink); font-family: var(--body); font-size: 17px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

body {
  background-image:
    radial-gradient(circle at 20% 0%, rgba(177,79,43,0.04) 0, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(177,79,43,0.03) 0, transparent 50%);
  min-height: 100vh;
}

.app { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  background: var(--bg-deeper);
  border-right: 1px solid var(--rule);
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  padding: 28px 24px;
}

.brand {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 22px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  color: var(--ink);
  cursor: pointer;
}
.brand-sub { font-family: var(--body); font-size: 13px; color: var(--ink-faint); font-style: italic; margin-bottom: 26px; }

.progress-block { background: var(--paper); border: 1px solid var(--rule); padding: 14px 16px; margin-bottom: 24px; border-radius: 2px; }
.progress-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-faint); margin-bottom: 6px; }
.progress-text { font-family: var(--sans); font-size: 19px; font-weight: 500; margin-bottom: 10px; color: var(--ink); }
.progress-bar { height: 4px; background: var(--rule); position: relative; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

.nav-section { margin-bottom: 22px; }
.nav-module {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.01em;
  color: var(--ink);
  cursor: pointer;
  padding: 10px 8px 6px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  border-top: 1px solid var(--rule);
  user-select: none;
}
.nav-module:hover { color: var(--accent); }
.nav-module-num { color: var(--ink-faint); font-weight: 500; min-width: 22px; font-feature-settings: 'tnum'; }
.nav-module-title { flex: 1; line-height: 1.3; }
.nav-module-caret { color: var(--ink-faint); font-size: 11px; transition: transform 0.2s; }
.nav-module.open .nav-module-caret { transform: rotate(90deg); }

.nav-lessons { display: none; padding: 4px 0 8px 30px; }
.nav-module.open + .nav-lessons { display: block; }

.nav-lesson {
  font-family: var(--body);
  font-size: 14.5px;
  color: var(--ink-soft);
  padding: 5px 0 5px 12px;
  cursor: pointer;
  border-left: 1px solid var(--rule);
  margin-left: 0;
  line-height: 1.4;
  position: relative;
  transition: color 0.15s, border-color 0.15s;
}
.nav-lesson:hover { color: var(--ink); border-left-color: var(--rule-strong); }
.nav-lesson.active { color: var(--accent); border-left: 2px solid var(--accent); font-weight: 500; }
.nav-lesson.done::before { content: '✓'; position: absolute; left: -14px; color: var(--good); font-size: 11px; top: 7px; font-family: var(--mono); }

.nav-lesson-num { color: var(--ink-faint); font-feature-settings: 'tnum'; margin-right: 6px; font-size: 13px; }

.nav-review {
  font-family: var(--sans);
  font-style: italic;
  font-size: 14px;
  color: var(--accent);
  padding: 7px 0 7px 12px;
  margin-top: 4px;
  cursor: pointer;
  border-left: 1px solid var(--accent);
  margin-left: 0;
  font-weight: 500;
}
.nav-review:hover { background: var(--paper); }
.nav-review.active { background: var(--paper); }

/* MAIN */
.main { padding: 60px 80px 120px; max-width: 100%; min-width: 0; }

/* INTRO / HOME */
.home { animation: fadeIn 0.5s ease; }
.home-eyebrow { font-family: var(--sans); font-style: italic; color: var(--accent); font-size: 17px; letter-spacing: 0.02em; margin-bottom: 16px; }
.home-title {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 64px;
  line-height: 1.02;
  letter-spacing: -0.02em;
  margin-bottom: 22px;
  color: var(--ink);
}
.home-title em { font-style: italic; font-weight: 300; color: var(--accent); }
.home-deck { font-family: var(--body); font-size: 22px; line-height: 1.5; color: var(--ink-soft); max-width: 640px; margin-bottom: 44px; font-weight: 400; }
.home-deck em { font-style: italic; color: var(--ink); }

.home-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin: 40px 0 56px; padding: 28px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.home-meta-item .num { font-family: var(--sans); font-weight: 400; font-size: 38px; color: var(--accent); line-height: 1; margin-bottom: 6px; font-feature-settings: 'tnum'; }
.home-meta-item .lbl { font-size: 13px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; }

.home h2 { font-family: var(--sans); font-weight: 500; font-size: 30px; letter-spacing: -0.01em; margin-top: 50px; margin-bottom: 18px; color: var(--ink); }
.home p { font-size: 18px; margin-bottom: 18px; max-width: 680px; color: var(--ink-soft); }
.home p strong { color: var(--ink); font-weight: 500; }

.timeline { margin: 24px 0; }
.timeline-row { display: grid; grid-template-columns: 80px 1fr 80px; gap: 20px; padding: 14px 0; border-bottom: 1px solid var(--rule); align-items: baseline; }
.timeline-mod { font-family: var(--sans); font-style: italic; color: var(--accent); font-size: 18px; }
.timeline-name { font-family: var(--sans); font-weight: 500; font-size: 17px; color: var(--ink); }
.timeline-name .sub { display: block; font-family: var(--body); font-weight: 400; font-style: italic; font-size: 14px; color: var(--ink-faint); margin-top: 2px; }
.timeline-hours { font-family: var(--mono); font-size: 13px; color: var(--ink-faint); text-align: right; }

.start-btn {
  display: inline-block;
  font-family: var(--sans);
  font-size: 17px;
  font-weight: 500;
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px 26px;
  cursor: pointer;
  margin-top: 36px;
  letter-spacing: 0.01em;
  transition: background 0.15s;
}
.start-btn:hover { background: #963F1F; }

.callout {
  background: var(--paper);
  border-left: 3px solid var(--accent);
  padding: 18px 22px;
  margin: 26px 0;
  max-width: 680px;
}
.callout-label { font-family: var(--sans); font-style: italic; font-size: 14px; color: var(--accent); margin-bottom: 6px; }
.callout p { font-size: 16px; margin: 0; color: var(--ink-soft); }

/* LESSON */
.lesson { animation: fadeIn 0.4s ease; max-width: 740px; }
.lesson-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--rule); }
.lesson-meta { font-family: var(--sans); font-style: italic; color: var(--accent); font-size: 16px; margin-bottom: 8px; letter-spacing: 0.02em; }
.lesson-title {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 44px;
  line-height: 1.08;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 12px;
}
.lesson-teaches { font-family: var(--body); font-style: italic; font-size: 19px; color: var(--ink-soft); }

.section { margin-bottom: 36px; }
.section-label {
  font-family: var(--sans);
  font-style: italic;
  font-size: 15px;
  color: var(--accent);
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.section-h {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.005em;
  color: var(--ink);
  margin-bottom: 12px;
}
.section p { font-size: 17.5px; line-height: 1.65; color: var(--ink); margin-bottom: 14px; }
.section p:last-child { margin-bottom: 0; }
.section ul { list-style: none; margin: 12px 0; padding: 0; }
.section ul li { font-size: 17px; line-height: 1.55; color: var(--ink); padding: 4px 0 4px 22px; position: relative; }
.section ul li::before { content: '—'; position: absolute; left: 0; color: var(--accent); font-weight: 400; }

code.inline {
  font-family: var(--mono);
  font-size: 0.88em;
  background: var(--bg-deeper);
  padding: 1px 6px;
  color: var(--ink);
  border-radius: 2px;
  white-space: nowrap;
}

.code-block {
  background: var(--code-bg);
  color: var(--code-text);
  font-family: var(--mono);
  font-size: 14.5px;
  line-height: 1.55;
  padding: 18px 22px;
  margin: 14px 0;
  border-radius: 2px;
  overflow-x: auto;
  white-space: pre;
  tab-size: 4;
}
.code-block .kw { color: var(--code-keyword); font-weight: 500; }
.code-block .str { color: var(--code-string); }
.code-block .num { color: var(--code-number); }
.code-block .cm { color: var(--code-comment); font-style: italic; }
.code-block .fn { color: var(--code-fn); }

.example-pair { margin: 18px 0; }
.example-label { font-family: var(--sans); font-style: italic; font-size: 14px; color: var(--ink-faint); margin-bottom: 4px; padding-left: 4px; }
.example-pair .code-block { margin: 0; }
.output {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-top: none;
  font-family: var(--mono);
  font-size: 13.5px;
  color: var(--ink-soft);
  padding: 12px 22px;
  white-space: pre-wrap;
  line-height: 1.55;
}
.output-label { font-family: var(--sans); font-style: italic; font-size: 12.5px; color: var(--accent); margin-bottom: 4px; text-transform: lowercase; letter-spacing: 0.02em; }

.note {
  background: var(--bg-deeper);
  border-left: 3px solid var(--ink-faint);
  padding: 14px 18px;
  margin: 18px 0;
  font-size: 16px;
  color: var(--ink-soft);
  line-height: 1.55;
}
.note strong { color: var(--ink); font-weight: 500; }

/* PRACTICE */
.practice-block { background: var(--paper); border: 1px solid var(--rule); padding: 24px 26px; margin: 24px 0; border-radius: 2px; }
.practice-label { font-family: var(--sans); font-style: italic; font-size: 14px; color: var(--accent); letter-spacing: 0.02em; margin-bottom: 4px; }
.practice-count { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
.practice-prompt { font-family: var(--sans); font-weight: 500; font-size: 18px; margin: 6px 0 14px; color: var(--ink); line-height: 1.4; }
.practice-prompt code { font-family: var(--mono); font-size: 0.92em; background: var(--bg-deeper); padding: 1px 5px; }

.practice-code { background: var(--code-bg); color: var(--code-text); font-family: var(--mono); font-size: 14px; padding: 14px 18px; white-space: pre; overflow-x: auto; margin: 0 0 14px; border-radius: 2px; line-height: 1.55; }

.practice-input { width: 100%; font-family: var(--mono); font-size: 15px; padding: 10px 14px; border: 1px solid var(--rule-strong); background: white; color: var(--ink); outline: none; transition: border-color 0.15s; box-sizing: border-box; }
.practice-input:focus { border-color: var(--accent); }
.practice-input.locked { background: var(--bg-deeper); cursor: not-allowed; }
textarea.practice-input { resize: vertical; min-height: 64px; line-height: 1.5; display: block; }

.practice-actions { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
.practice-btn {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 9px 18px;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: background 0.15s;
}
.practice-btn:hover { background: var(--accent); }
.practice-btn.secondary { background: transparent; color: var(--ink-soft); border: 1px solid var(--rule-strong); }
.practice-btn.secondary:hover { background: var(--bg-deeper); color: var(--ink); }

.choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.choice {
  font-family: var(--body);
  font-size: 16px;
  background: white;
  border: 1px solid var(--rule-strong);
  padding: 11px 16px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  color: var(--ink);
  line-height: 1.45;
  font-feature-settings: 'liga';
}
.choice code { font-family: var(--mono); font-size: 0.9em; background: var(--bg-deeper); padding: 1px 4px; }
.choice:hover { border-color: var(--accent); background: var(--paper); }
.choice.locked { cursor: default; }
.choice.locked:hover { background: white; border-color: var(--rule-strong); }
.choice.correct { background: var(--good-soft); border-color: var(--good); color: var(--good); }
.choice.wrong { background: var(--bad-soft); border-color: var(--bad); color: var(--bad); }
.choice.muted { opacity: 0.5; }
.choice .marker { font-family: var(--mono); font-size: 13px; margin-right: 8px; color: var(--ink-faint); }
.choice.correct .marker, .choice.wrong .marker { color: inherit; }

.feedback { margin-top: 14px; padding: 14px 16px; border-radius: 2px; font-size: 15.5px; line-height: 1.5; display: none; }
.feedback.show { display: block; animation: slideDown 0.25s ease; }
.feedback.good { background: var(--good-soft); border-left: 3px solid var(--good); color: var(--good); }
.feedback.bad { background: var(--bad-soft); border-left: 3px solid var(--bad); color: var(--bad); }
.feedback-head { font-family: var(--sans); font-weight: 600; font-size: 16px; margin-bottom: 4px; letter-spacing: 0.01em; }
.feedback-body { font-family: var(--body); color: var(--ink); font-size: 15.5px; }
.feedback-body code { font-family: var(--mono); background: rgba(0,0,0,0.06); padding: 1px 4px; }

.recap { background: var(--bg-deeper); border: 1px solid var(--rule); padding: 20px 24px; margin-top: 36px; }
.recap-label { font-family: var(--sans); font-style: italic; font-size: 14px; color: var(--accent); margin-bottom: 6px; letter-spacing: 0.02em; }
.recap-text { font-family: var(--body); font-size: 17px; color: var(--ink); line-height: 1.55; }

.lesson-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 50px; padding-top: 26px; border-top: 1px solid var(--rule); }
.foot-btn {
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 500;
  background: transparent;
  border: 1px solid var(--rule-strong);
  color: var(--ink);
  padding: 11px 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.foot-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.foot-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.foot-btn:disabled:hover { background: transparent; color: var(--ink); border-color: var(--rule-strong); }
.foot-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.foot-btn.primary:hover { background: #963F1F; border-color: #963F1F; }

.mark-done { font-family: var(--sans); font-style: italic; font-size: 14px; color: var(--ink-faint); cursor: pointer; user-select: none; text-align: center; }
.mark-done:hover { color: var(--accent); }
.mark-done.done { color: var(--good); }
.mark-done.done::before { content: '✓ '; font-family: var(--mono); }

/* REVIEW PAGE */
.review-page { animation: fadeIn 0.4s ease; max-width: 740px; }
.review-eyebrow { font-family: var(--sans); font-style: italic; color: var(--accent); font-size: 16px; margin-bottom: 6px; }
.review-title { font-family: var(--sans); font-weight: 400; font-size: 44px; letter-spacing: -0.015em; margin-bottom: 12px; color: var(--ink); }
.review-blurb { font-family: var(--body); font-size: 18px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 30px; }
.review-score { background: var(--bg-deeper); padding: 18px 24px; margin-bottom: 28px; border-left: 3px solid var(--accent); font-family: var(--sans); font-size: 18px; }
.review-score .num { color: var(--accent); font-weight: 600; }

/* ONBOARDING */
body.onboarding .sidebar { display: none; }
body.onboarding .app { grid-template-columns: 1fr; }
body.onboarding .main { padding: 0; max-width: none; }

.onboard { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 40px; animation: fadeIn 0.6s ease; }
.onboard-inner { max-width: 640px; width: 100%; }
.onboard-eyebrow { font-family: var(--sans); font-style: italic; color: var(--accent); font-size: 17px; margin-bottom: 14px; letter-spacing: 0.02em; }
.onboard-title {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 48px;
  line-height: 1.08;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 18px;
}
.onboard-deck { font-family: var(--body); font-size: 19px; line-height: 1.55; color: var(--ink-soft); margin-bottom: 36px; max-width: 560px; }
.onboard-cards {
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  background: var(--paper);
}
.pace-card {
  display: grid;
  grid-template-columns: 180px 110px 1fr;
  align-items: baseline;
  gap: 24px;
  padding: 20px 24px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--rule);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: background 0.15s, padding-left 0.15s;
  color: var(--ink);
  width: 100%;
  font-feature-settings: 'tnum';
}
.pace-card:first-child { border-top: none; }
.pace-card:hover { background: var(--bg-deeper); padding-left: 30px; }
.pace-hours { font-family: var(--sans); font-weight: 500; font-size: 21px; color: var(--ink); letter-spacing: -0.005em; }
.pace-days { font-family: var(--body); font-size: 18px; color: var(--ink); }
.pace-days strong { font-weight: 600; font-size: 22px; color: var(--accent); }
.pace-note { font-family: var(--sans); font-style: italic; font-size: 14.5px; color: var(--ink-faint); }
.pace-card:hover .pace-note { color: var(--accent); }
.onboard-foot { margin-top: 28px; font-family: var(--body); font-size: 15px; color: var(--ink-faint); font-style: italic; max-width: 560px; line-height: 1.5; }

/* Adjust pace link on home */
.pace-link {
  display: inline-block;
  font-family: var(--sans);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-faint);
  cursor: pointer;
  margin-top: 4px;
  margin-bottom: 32px;
  border-bottom: 1px dotted var(--ink-faint);
  padding-bottom: 1px;
  transition: color 0.15s, border-color 0.15s;
}
.pace-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

/* SOURCES FOOTER */
.lesson-sources {
  margin-top: 56px;
  margin-bottom: 32px;
  padding: 22px 26px;
  background: var(--bg-deeper);
  border-left: 3px solid var(--accent);
  border-radius: 0 4px 4px 0;
  font-family: var(--body);
  max-width: 740px;
}
.sources-label {
  font-family: var(--sans);
  font-style: italic;
  color: var(--accent);
  font-size: 12.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 500;
}
.sources-specific {
  font-size: 15px;
  color: var(--ink-soft);
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--rule);
  line-height: 1.55;
}
.sources-tag {
  font-style: italic;
  color: var(--ink-faint);
  margin-right: 4px;
}
.sources-specific a {
  font-family: var(--mono);
  font-size: 13.5px;
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dotted var(--accent);
  word-break: break-all;
}
.sources-specific a:hover { border-bottom-style: solid; }
.sources-general {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 22px;
  font-size: 14.5px;
}
.sources-general a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dotted var(--accent);
  font-family: var(--body);
  position: relative;
}
.sources-general a:hover { border-bottom-style: solid; }
.sources-general a::after {
  content: ' →';
  font-family: var(--sans);
  color: var(--ink-faint);
  border: none;
}

/* Auto-linkified URLs inside lesson prose */
.ref-link {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dotted var(--accent);
  font-family: var(--mono);
  font-size: 0.94em;
  word-break: break-all;
}
.ref-link:hover { border-bottom-style: solid; }

/* responsive */
@media (max-width: 980px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; max-height: 50vh; }
  .main { padding: 32px 24px 80px; }
  .lesson-title { font-size: 34px; }
  .home-title { font-size: 44px; }
  .home-meta { grid-template-columns: 1fr; gap: 14px; }
  .onboard { padding: 36px 20px; }
  .onboard-title { font-size: 32px; }
  .onboard-deck { font-size: 17px; }
  .pace-card { grid-template-columns: 1fr; gap: 4px; padding: 16px 18px; }
  .pace-card:hover { padding-left: 18px; }
  .pace-days strong { font-size: 20px; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; } to { opacity: 1; max-height: 500px; } }

/* scrollbar */
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--rule-strong); border-radius: 3px; }

.code-block::-webkit-scrollbar-thumb, .practice-code::-webkit-scrollbar-thumb { background: var(--ink-faint); }

<script>
const CURRICULUM = {"modules": [{"id": "m1", "number": 1, "title": "Foundations", "subtitle": "Lessons 1-15 · The Basics", "hours": 8, "intro": "These fifteen lessons cover what shows up in every script: printing, variables, math, conditions, loops, functions, and tables. The rest of the guide assumes you've got these down, so don't blow through them.", "lessons": [{"id": "l1", "number": 1, "title": "print() — Showing Output", "teaches": "How to make your code display a value.", "idea": "print() puts a value in the output window.", "examples": [{"code": "print(\"Hello\")", "out": "Hello"}, {"code": "print(\"Hi\")\nprint(\"Welcome\")", "out": "Hi\nWelcome"}], "why": "Useful for two things: confirming a line of code actually ran, and seeing what a variable holds. You'll use it a lot.", "questions": [{"type": "predict", "prompt": "What does this print?", "code": "print(\"Testing\")", "answer": ["Testing"], "explain": "Whatever is inside the quotes is what print() shows."}, {"type": "predict", "prompt": "What does this print, on two lines?", "code": "print(\"One\")\nprint(\"Two\")", "answer": ["One\nTwo", "One Two"], "explain": "Each print() makes its own line of output."}], "recap": "print(value) shows the value in the output."}, {"id": "l2", "number": 2, "title": "Variables and local", "teaches": "How to store a value so you can use it later.", "idea": "A variable holds a value under a name. Write `local`, the name, `=`, then the value. To use it later, write the name.", "examples": [{"code": "local name = \"Alex\"\nprint(name)", "out": "Alex"}, {"code": "local coins = 10\nprint(coins)", "out": "10"}], "why": "Once a value has a name, you can refer to it as many times as you want without repeating the value itself.", "note": "Skip `local` and the variable becomes global, meaning anything anywhere can change it. That causes weird, hard-to-find bugs. Always write `local`.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local pet = \"Dog\"\nprint(pet)", "answer": ["Dog"], "explain": "pet holds 'Dog'. print(pet) shows what's inside pet."}, {"type": "choice", "prompt": "Which line correctly creates a local variable holding the number 7?", "choices": ["score = 7", "local 7 = score", "local score = 7", "score local = 7"], "answer": 2, "explain": "The pattern is `local name = value`."}], "recap": "Variables hold values. Always write `local` when creating one."}, {"id": "l3", "number": 3, "title": "Strings", "teaches": "Text values.", "idea": "A string is text. Wrap it in quotes, either `\"double\"` or `'single'`.", "examples": [{"code": "local message = \"Hello\"\nprint(message)", "out": "Hello"}, {"code": "local gameName = \"Sky Battle\"\nprint(gameName)", "out": "Sky Battle"}], "why": "Anything that's text in your game — names, messages, item labels, error text — is a string.", "note": "Without quotes, Luau thinks you're referring to another variable. `local word = Hi` errors. `local word = \"Hi\"` works.", "questions": [{"type": "choice", "prompt": "Which one is a valid string assignment?", "choices": ["local x = Welcome", "local x = \"Welcome\"", "local \"Welcome\" = x", "local x == \"Welcome\""], "answer": 1, "explain": "Text needs quotes, and a single = is assignment (== is comparison)."}, {"type": "predict", "prompt": "What prints?", "code": "local text = \"Welcome back\"\nprint(text)", "answer": ["Welcome back"], "explain": "The string stored in text shows as written."}], "recap": "Strings are text wrapped in quotes."}, {"id": "l4", "number": 4, "title": "Numbers and Booleans", "teaches": "Two more value types.", "idea": "Numbers are written without quotes (5, 10, 3.14). Booleans are exactly the words true and false — lowercase, no quotes.", "examples": [{"code": "local coins = 25\nprint(coins)", "out": "25"}, {"code": "local isReady = true\nprint(isReady)", "out": "true"}], "why": "Numbers track counts and quantities (coins, health, level). Booleans track yes/no states (door open, game running, character spawned).", "note": "`5` is a number. `\"5\"` is a string containing the digit 5. They behave differently. Same for `true` (boolean) vs `\"true\"` (string).", "questions": [{"type": "predict", "prompt": "What prints, on two lines?", "code": "local age = 16\nlocal canPlay = true\nprint(age)\nprint(canPlay)", "answer": ["16\ntrue", "16 true"], "explain": "First age (16), then the boolean true."}, {"type": "choice", "prompt": "Which is a valid boolean?", "choices": ["\"true\"", "True", "true", "1"], "answer": 2, "explain": "Booleans are exactly true or false. Lowercase, no quotes. 'true' with quotes is a string; True with a capital is just an undefined name."}], "recap": "Number: numeric value. Boolean: true or false."}, {"id": "l5", "number": 5, "title": "Changing a Variable", "teaches": "Updating the value in a variable.", "idea": "After a variable exists, you can change what it holds. Write the name, `=`, and the new value. Don't write `local` again — that would create a different variable.", "examples": [{"code": "local coins = 10\nprint(coins)\n\ncoins = 20\nprint(coins)", "out": "10\n20"}, {"code": "local name = \"Alex\"\nprint(name)\n\nname = \"Sam\"\nprint(name)", "out": "Alex\nSam"}], "why": "Health drops when a player gets hit. Coin counts go up when you collect. The same variable carries the value through all those changes.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local score = 5\nscore = 8\nprint(score)", "answer": ["8"], "explain": "score was 5, then it was set to 8. The latest value wins."}, {"type": "choice", "prompt": "After this code, what is health?\n\n```\nlocal health = 100\nhealth = 50\nhealth = 75\n```", "choices": ["100", "50", "75", "all three"], "answer": 2, "explain": "Each assignment replaces the previous value. The last one set wins."}], "recap": "Replace a value with `name = newValue`. No `local` on the second assignment."}, {"id": "l6", "number": 6, "title": "Basic Math", "teaches": "Arithmetic with numbers.", "idea": "Luau does math with +, -, *, and /. The result of an expression can be stored in a variable.", "examples": [{"code": "local a = 10\nlocal b = 5\n\nprint(a + b)\nprint(a - b)\nprint(a * b)\nprint(a / b)", "out": "15\n5\n50\n2"}, {"code": "local coins = 10\ncoins = coins + 5\nprint(coins)", "out": "15"}], "why": "Most state changes in a game are math. coins go up by 5. health goes down by damage. score goes up by 1. This pattern is everywhere.", "note": "On `coins = coins + 5`, the right side runs first. Luau reads the current value of coins, adds 5, then stores the result back into coins.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local health = 20\nhealth = health - 4\nprint(health)", "answer": ["16"], "explain": "20 minus 4 is 16, stored back into health."}, {"type": "predict", "prompt": "What prints?", "code": "local x = 3\nlocal y = 4\nprint(x * y)", "answer": ["12"], "explain": "3 times 4 is 12."}], "recap": "+, -, *, /. Math is how you change numeric values."}, {"id": "l7", "number": 7, "title": "Comparisons", "teaches": "Asking questions about values.", "idea": "A comparison checks a relationship between two values. The answer is always true or false.", "examples": [{"code": "print(5 == 5)\nprint(5 == 3)", "out": "true\nfalse"}, {"code": "local coins = 10\nprint(coins > 5)\nprint(coins < 5)", "out": "true\nfalse"}], "why": "Code makes decisions by comparing values. Is the player's level high enough? Is the price within budget? Comparisons are how you ask.", "note": "Watch out: `=` assigns, `==` compares. Mixing them up is the most common typo in beginner code.", "ref": "Comparison operators: == equal, ~= not equal, > greater, < less, >= greater or equal, <= less or equal.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local level = 8\nprint(level >= 8)", "answer": ["true"], "explain": "8 is greater than or equal to 8."}, {"type": "predict", "prompt": "What prints?", "code": "print(\"cat\" == \"Cat\")", "answer": ["false"], "explain": "Strings are case-sensitive. 'cat' and 'Cat' are not equal."}, {"type": "choice", "prompt": "Which operator means 'not equal to'?", "choices": ["!=", "<>", "~=", "=/="], "answer": 2, "explain": "In Luau, ~= means not equal. (Most other languages use !=, so it's easy to slip up.)"}], "recap": "Comparisons return true or false. == compares, = assigns."}, {"id": "l8", "number": 8, "title": "if Statements", "teaches": "Making decisions.", "idea": "An if statement runs a block of code only when a condition is true. `else` covers the false case. `elseif` chains more checks.", "examples": [{"code": "local coins = 10\n\nif coins > 5 then\n    print(\"You have enough coins\")\nend", "out": "You have enough coins"}, {"code": "local health = 0\n\nif health > 0 then\n    print(\"Alive\")\nelse\n    print(\"Out\")\nend", "out": "Out"}, {"code": "local score = 70\n\nif score >= 90 then\n    print(\"A\")\nelseif score >= 80 then\n    print(\"B\")\nelseif score >= 70 then\n    print(\"C\")\nelse\n    print(\"Below C\")\nend", "out": "C"}], "why": "Anywhere a game has rules, if statements enforce them. Level 5 or higher can enter. Door is locked, don't open. Health hit zero, respawn.", "note": "Every if needs an `end` to close it. Forgetting `end` is the most common beginner error after = vs ==.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local wins = 3\n\nif wins >= 1 then\n    print(\"Winner\")\nend", "answer": ["Winner"], "explain": "3 is at least 1, so the block runs."}, {"type": "predict", "prompt": "What prints?", "code": "local score = 65\n\nif score >= 90 then\n    print(\"A\")\nelseif score >= 75 then\n    print(\"B\")\nelse\n    print(\"Keep going\")\nend", "answer": ["Keep going"], "explain": "65 isn't 90+ and isn't 75+, so neither branch runs. else catches what's left."}], "recap": "if checks a condition. else for the false case. elseif for additional checks."}, {"id": "l9", "number": 9, "title": "while Loops", "teaches": "Repeating code while a condition stays true.", "idea": "A while loop checks a condition. If true, it runs the block, then checks again. It keeps going until the condition becomes false.", "examples": [{"code": "local count = 1\n\nwhile count <= 3 do\n    print(count)\n    count = count + 1\nend", "out": "1\n2\n3"}], "why": "Use while when you don't know how many times something should repeat. A door stays open until a button is pressed. A timer ticks until it hits zero.", "note": "Something inside the loop has to change the condition. Otherwise the loop never ends and the script freezes. That's called an infinite loop.", "questions": [{"type": "predict", "prompt": "What prints, one number per line?", "code": "local number = 2\n\nwhile number <= 4 do\n    print(number)\n    number = number + 1\nend", "answer": ["2\n3\n4", "2 3 4"], "explain": "Starts at 2, prints, becomes 3, prints, becomes 4, prints, becomes 5, condition fails, stops."}, {"type": "choice", "prompt": "What's wrong with this loop?\n\n```\nlocal x = 1\nwhile x > 0 do\n    print(x)\nend\n```", "choices": ["It won't run", "It runs once", "It runs forever (infinite loop)", "It errors"], "answer": 2, "explain": "x never changes, so x > 0 is always true. The loop never stops."}], "recap": "while repeats the block while the condition stays true. Change something inside so it can eventually stop."}, {"id": "l10", "number": 10, "title": "for Loops", "teaches": "Counting loops.", "idea": "A numeric for loop counts. Write `for i = start, stop do` and the variable `i` takes each value from start to stop.", "examples": [{"code": "for i = 1, 5 do\n    print(i)\nend", "out": "1\n2\n3\n4\n5"}, {"code": "for i = 5, 1, -1 do\n    print(i)\nend", "out": "5\n4\n3\n2\n1"}], "why": "When you know the count up front — five iterations, ten items, count down from three — for is cleaner than while because the counting is built in.", "note": "Add a third number for the step. `for i = 5, 1, -1` counts down. `for i = 0, 100, 10` goes by tens.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "for i = 1, 3 do\n    print(\"Hi\")\nend", "answer": ["Hi\nHi\nHi"], "explain": "Three iterations. Each one prints Hi. i counts 1, 2, 3 but isn't used in the body."}, {"type": "predict", "prompt": "What prints?", "code": "for i = 2, 10, 2 do\n    print(i)\nend", "answer": ["2\n4\n6\n8\n10"], "explain": "Start at 2, step by 2, stop when going past 10."}], "recap": "for loops count from start to stop. Use them when the count is known."}, {"id": "l11", "number": 11, "title": "Functions", "teaches": "Packaging code under a name.", "idea": "Define a block of code once with `local function name() ... end`. Run it with `name()` whenever you need that code to execute.", "examples": [{"code": "local function sayHello()\n    print(\"Hello\")\nend\n\nsayHello()", "out": "Hello"}, {"code": "local function showWin()\n    print(\"You win\")\nend\n\nshowWin()\nshowWin()", "out": "You win\nYou win"}], "why": "Anywhere the same logic shows up more than once, put it in a function. Write the code once, give it a name that says what it does, call the name.", "note": "The shape is: `local function name()` ... `end`. Empty parentheses mean the function takes no inputs. Inputs come in the next lesson.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function greet()\n    print(\"Welcome\")\nend\n\ngreet()\ngreet()", "answer": ["Welcome\nWelcome"], "explain": "Function is called twice, so it prints twice."}, {"type": "choice", "prompt": "What's missing here?\n\n```\nlocal function sayHi()\n    print(\"Hi\")\n```", "choices": ["a return", "the word end", "a comma", "nothing — it works"], "answer": 1, "explain": "Every function body needs `end` to close it."}], "recap": "Functions are named, reusable blocks of code."}, {"id": "l12", "number": 12, "title": "Parameters and return", "teaches": "Giving inputs to a function and getting outputs back.", "idea": "Parameters are inputs, written between the parentheses. `return` sends a value out of the function.", "examples": [{"code": "local function greet(name)\n    print(\"Hello \" .. name)\nend\n\ngreet(\"Alex\")", "out": "Hello Alex"}, {"code": "local function add(a, b)\n    return a + b\nend\n\nlocal total = add(5, 3)\nprint(total)", "out": "8"}], "why": "Parameters make a function general. One function with parameters handles every case, instead of writing a new function for each specific value.", "note": "`return` ends the function immediately. Any lines after `return` don't run.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function double(number)\n    return number * 2\nend\n\nprint(double(4))", "answer": ["8"], "explain": "double(4) returns 4 * 2 = 8. print() shows it."}, {"type": "predict", "prompt": "What prints?", "code": "local function shout(text)\n    return text .. \"!\"\nend\n\nprint(shout(\"Hey\"))", "answer": ["Hey!"], "explain": "Returns 'Hey' joined with '!' which is 'Hey!'."}], "recap": "Parameters bring values in. return sends a value out."}, {"id": "l13", "number": 13, "title": "Tables as Lists", "teaches": "Storing many values under one name.", "idea": "A table can hold a list of values. Wrap them in curly braces, comma-separated. Read each one by its position (index), starting at 1.", "examples": [{"code": "local fruits = {\"Apple\", \"Banana\", \"Pear\"}\n\nprint(fruits[1])\nprint(fruits[2])\nprint(fruits[3])", "out": "Apple\nBanana\nPear"}, {"code": "local items = {\"Sword\", \"Shield\"}\ntable.insert(items, \"Potion\")\n\nprint(items[3])", "out": "Potion"}], "why": "Almost no real code deals with one value at a time. A player has many items. A leaderboard has many entries. A list of NPCs is a list. Tables hold those.", "note": "Luau list indexes start at 1, not 0. Coming from Python, JavaScript, or C, this feels wrong for a few days. Then it stops feeling wrong.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local colors = {\"Red\", \"Blue\"}\nprint(colors[2])", "answer": ["Blue"], "explain": "Index 1 is 'Red'. Index 2 is 'Blue'."}, {"type": "choice", "prompt": "In Luau, the first item of a list-style table is at index ___ ?", "choices": ["0", "1", "either", "depends"], "answer": 1, "explain": "Luau uses 1-based indexing."}], "recap": "Tables hold lists. Index from 1."}, {"id": "l14", "number": 14, "title": "Tables with Named Keys + ipairs()", "teaches": "Tables with named fields, and how to loop through a list table.", "idea": "Tables can use named keys (like Name, Coins, Level) instead of numeric positions. Read named keys with the dot: `data.Name`. To walk a list table in order, use `ipairs()`.", "examples": [{"code": "local playerData = {\n    Name = \"Alex\",\n    Coins = 50,\n    Level = 7\n}\n\nprint(playerData.Name)\nprint(playerData.Coins)", "out": "Alex\n50"}, {"code": "local pets = {\"Dog\", \"Cat\", \"Bird\"}\n\nfor i, pet in ipairs(pets) do\n    print(i, pet)\nend", "out": "1 Dog\n2 Cat\n3 Bird"}], "why": "Named keys say what they are. `player.HP` reads as the HP field of player. Looping with ipairs is the standard way to read every item of a list in order.", "note": "`playerData.Name` and `playerData[\"Name\"]` are the same thing. The dot is shorthand when the key is a plain word.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local car = {\n    Brand = \"Bolt\",\n    Speed = 120\n}\n\nprint(car.Speed)", "answer": ["120"], "explain": "car.Speed reads the value at the key Speed."}, {"type": "predict", "prompt": "How many lines does this print?", "code": "local arr = {\"a\", \"b\", \"c\", \"d\"}\nfor i, v in ipairs(arr) do\n    print(v)\nend", "answer": ["4"], "explain": "Four items, four prints."}], "recap": "Named keys for structured data. Numeric indexes for lists. ipairs walks lists in order."}, {"id": "l15", "number": 15, "title": "Modules + Good Habits", "teaches": "Putting reusable code in its own file, and a few habits worth picking up early.", "idea": "A module is a ModuleScript that returns a value, usually a table of functions. Another script reads that value with `require`.", "examples": [{"code": "-- Inside ModuleScript named 'Tools'\nlocal Tools = {}\n\nfunction Tools.double(number)\n    return number * 2\nend\n\nreturn Tools", "out": "(module defined)"}, {"code": "-- Inside a different script\nlocal Tools = require(script.Parent.Tools)\nprint(Tools.double(5))", "out": "10"}], "why": "Once your code is more than one file, modules are how you organize. Group related helpers in one module, return the table, use them from any script.", "habits": ["Use `local` for every variable.", "Pick clear names. playerHealth beats x.", "Test as you go with print().", "Learn one idea at a time. Don't jump ahead.", "Don't build a complex system before the basics feel automatic."], "questions": [{"type": "predict", "prompt": "Given the Tools module above, what would Tools.double(8) return?", "code": "Tools.double(8)", "answer": ["16"], "explain": "double(8) returns 8 * 2 = 16."}, {"type": "choice", "prompt": "What does a ModuleScript end with?", "choices": ["print()", "return <the table>", "end", "local"], "answer": 1, "explain": "The module returns the table (or value) it wants to expose. require() returns what the module returned."}], "recap": "Modules return a table. Other scripts require it. Standard way to organize Luau."}], "review": {"title": "Module 1 Checkpoint", "blurb": "If you can't answer one of these without thinking, re-read that lesson before moving on. Module 2 builds directly on these.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local name = \"Sam\"\nname = \"Lee\"\nprint(name)", "answer": ["Lee"], "explain": "Reassignment replaces the value. Lesson 5."}, {"type": "predict", "prompt": "What prints?", "code": "local total = 0\nfor i = 1, 4 do\n    total = total + i\nend\nprint(total)", "answer": ["10"], "explain": "1+2+3+4 = 10. Lesson 10."}, {"type": "choice", "prompt": "Which keyword closes a function or loop block?", "choices": ["stop", "close", "end", "done"], "answer": 2, "explain": "Luau uses `end` for if, for, while, function, and do blocks."}, {"type": "predict", "prompt": "What prints?", "code": "local function triple(n)\n    return n * 3\nend\nprint(triple(5))", "answer": ["15"], "explain": "5 * 3 = 15. Lesson 12."}, {"type": "choice", "prompt": "In Luau, list table indexes start at:", "choices": ["0", "1", "the value you choose", "-1"], "answer": 1, "explain": "Always 1 in Luau. Lesson 13."}, {"type": "predict", "prompt": "What prints?", "code": "local player = {Name = \"Mia\", HP = 100}\nprint(player.HP)", "answer": ["100"], "explain": "player.HP reads the value at the key HP. Lesson 14."}, {"type": "choice", "prompt": "Which one is correct?", "choices": ["if x = 5 then ... end", "if x == 5 then ... end", "if x === 5 then ... end", "if x is 5 then ... end"], "answer": 1, "explain": "= assigns, == compares. Lesson 7-8."}]}}, {"id": "m2", "number": 2, "title": "Bridging the Gaps", "subtitle": "Lessons 16-30 · The Quiet Essentials", "hours": 8, "intro": "These are the topics most tutorials skip — comments, naming, how to combine conditions, what nil actually is, how to debug. Skipping them is why so many beginners feel lost two months in. We'll cover them.", "lessons": [{"id": "l16", "number": 16, "title": "Comments", "teaches": "Leaving notes inside code.", "idea": "A comment starts with `--` and runs to the end of the line. Luau ignores everything in a comment when running the code.", "examples": [{"code": "-- This is a comment\nprint(\"Hello\")", "out": "Hello"}, {"code": "local coins = 10 -- starting coins\nprint(coins)", "out": "10"}], "why": "Comments explain what code is doing to anyone reading it later, including yourself in six months.", "questions": [{"type": "choice", "prompt": "In `local health = 100 -- player starts full`, which part is the comment?", "choices": ["local health = 100", "-- player starts full", "the whole line", "nothing"], "answer": 1, "explain": "Everything from -- to end of line is the comment."}, {"type": "choice", "prompt": "What happens to a comment when you run the code?", "choices": ["It prints", "It errors", "It's ignored", "It becomes a variable"], "answer": 2, "explain": "Luau skips comments entirely."}], "recap": "-- starts a comment. Comments don't run."}, {"id": "l17", "number": 17, "title": "Better Variable Names", "teaches": "Naming variables so code reads clearly.", "idea": "A good name says what the value is. `playerHealth` is clear. `x` is not.", "examples": [{"code": "local x = 100", "out": "(less clear)"}, {"code": "local playerHealth = 100", "out": "(clear)"}], "why": "You write a name once but read it many times. The cost of a vague name compounds every time you have to stop and figure out what it holds.", "questions": [{"type": "choice", "prompt": "Which name says what it holds?", "choices": ["s = 45", "playerScore = 45", "y = 45", "p = 45"], "answer": 1, "explain": "playerScore tells you exactly what 45 represents."}, {"type": "choice", "prompt": "Best name for the count of coins a player owns?", "choices": ["c", "coinsValue123", "playerCoins", "thingThatCounts"], "answer": 2, "explain": "Clear and concise. Not too short, not bloated."}], "recap": "Name variables for what they contain."}, {"id": "l18", "number": 18, "title": "Joining Strings with ..", "teaches": "Putting pieces of text together (concatenation).", "idea": "The `..` operator joins two strings into one. It chains: `\"a\" .. \" \" .. \"b\"` gives `\"a b\"`.", "examples": [{"code": "local first = \"Hello\"\nlocal second = \"World\"\nprint(first .. \" \" .. second)", "out": "Hello World"}, {"code": "local name = \"Alex\"\nprint(\"Welcome \" .. name)", "out": "Welcome Alex"}], "why": "Anywhere you build text from values — score displays, chat messages, log lines — you're concatenating.", "note": "Forgetting the space is a classic bug. `\"Welcome\" .. name` prints `WelcomeAlex` with no space. Put the space inside one of the strings: `\"Welcome \" .. name`.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local item = \"Sword\"\nprint(\"You got a \" .. item)", "answer": ["You got a Sword"], "explain": ".. joins the literal text with the value."}, {"type": "predict", "prompt": "What prints?", "code": "local a = \"Hi\"\nlocal b = \"there\"\nprint(a .. b)", "answer": ["Hithere"], "explain": "No space between them in the code, so no space in the output."}], "recap": ".. joins strings."}, {"id": "l19", "number": 19, "title": "tostring() and tonumber()", "teaches": "Converting between text and numbers.", "idea": "`tostring(value)` returns the value as text. `tonumber(text)` returns the text as a number, or nil if it can't be converted.", "examples": [{"code": "local coins = 25\nprint(\"Coins: \" .. tostring(coins))", "out": "Coins: 25"}, {"code": "local textNumber = \"12\"\nlocal realNumber = tonumber(textNumber)\nprint(realNumber + 3)", "out": "15"}], "why": "Numbers and text often need to mix. A coin count might arrive from data as text but needs to be a number for math. A number needs to become text to display in a message.", "questions": [{"type": "predict", "prompt": "What does tonumber('8') return?", "code": "local v = tonumber(\"8\")\nprint(v)", "answer": ["8"], "explain": "The string '8' becomes the number 8."}, {"type": "predict", "prompt": "What prints?", "code": "print(tonumber(\"hello\"))", "answer": ["nil"], "explain": "'hello' isn't a number, so tonumber returns nil."}], "recap": "tostring goes to text. tonumber goes to number (or nil)."}, {"id": "l20", "number": 20, "title": "Truthiness — What Counts as true?", "teaches": "Which values Luau treats as true or false in a condition.", "idea": "In a Luau condition, only `false` and `nil` count as false. Everything else, including `0` and `\"\"`, counts as true.", "examples": [{"code": "if false then\n    print(\"This will not run\")\nend\n\nif 0 then\n    print(\"0 counts as true\")\nend\n\nif \"\" then\n    print(\"Empty text counts as true\")\nend", "out": "0 counts as true\nEmpty text counts as true"}], "why": "Most languages treat 0 and empty strings as false. Luau doesn't. Beginners coming from other languages get burned by this once. Burn it into memory now and save yourself the headache.", "questions": [{"type": "choice", "prompt": "Which of these counts as false in Luau?", "choices": ["0", "\"\"", "{}", "nil"], "answer": 3, "explain": "Only false and nil are falsy. 0, empty string, and empty table are all truthy."}, {"type": "predict", "prompt": "Does this run? Print yes or no.", "code": "if \"\" then\n    print(\"yes\")\nend", "answer": ["yes"], "explain": "Empty string is truthy in Luau."}], "recap": "Only false and nil are falsy in Luau."}, {"id": "l21", "number": 21, "title": "The and Operator", "teaches": "Both sides must be true.", "idea": "`and` is true when both sides are true. If either side is false, the whole expression is false.", "examples": [{"code": "local hasKey = true\nlocal doorUnlocked = true\n\nif hasKey and doorUnlocked then\n    print(\"Open the door\")\nend", "out": "Open the door"}, {"code": "local hasPass = true\nlocal isAllowed = false\n\nif hasPass and isAllowed then\n    print(\"Can enter\")\nend", "out": "(nothing)"}], "why": "Real rules often require multiple things at once. You can enter the boss room if you're level 10 AND have the key.", "questions": [{"type": "predict", "prompt": "Will this print? Yes or no.", "code": "local hasTool = true\nlocal isReady = true\n\nif hasTool and isReady then\n    print(\"Start\")\nend", "answer": ["yes"], "explain": "Both sides true, so and is true."}, {"type": "predict", "prompt": "What does this print?", "code": "local a = true\nlocal b = false\nprint(a and b)", "answer": ["false"], "explain": "true and false is false."}], "recap": "and needs both sides true."}, {"id": "l22", "number": 22, "title": "The or Operator", "teaches": "At least one side must be true.", "idea": "`or` is true when at least one side is true. It's only false when both sides are false.", "examples": [{"code": "local hasCoins = false\nlocal hasTicket = true\n\nif hasCoins or hasTicket then\n    print(\"Can enter\")\nend", "out": "Can enter"}, {"code": "local ownsPass = false\nlocal isStaff = false\n\nif ownsPass or isStaff then\n    print(\"Allowed\")\nend", "out": "(nothing)"}], "why": "When there are several valid ways to pass a check, `or` strings them together. Admin OR owner can open the panel.", "questions": [{"type": "predict", "prompt": "Will this print? Yes or no.", "code": "local isAdmin = false\nlocal isOwner = true\n\nif isAdmin or isOwner then\n    print(\"Open panel\")\nend", "answer": ["yes"], "explain": "One side is true, so or is true."}, {"type": "predict", "prompt": "What does this print?", "code": "print(false or false)", "answer": ["false"], "explain": "Both false, so or is false."}], "recap": "or needs at least one side true."}, {"id": "l23", "number": 23, "title": "The not Operator", "teaches": "Flipping true and false.", "idea": "`not` flips a boolean. `not true` is false, `not false` is true.", "examples": [{"code": "local isBusy = false\nprint(not isBusy)", "out": "true"}, {"code": "local isDead = false\n\nif not isDead then\n    print(\"Player is alive\")\nend", "out": "Player is alive"}], "why": "Sometimes the value you have means the opposite of what you want to check. `if not isLocked then` reads cleanly as 'if the door isn't locked, do this'.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local locked = true\nprint(not locked)", "answer": ["false"], "explain": "not true is false."}, {"type": "predict", "prompt": "What prints?", "code": "print(not nil)", "answer": ["true"], "explain": "nil is falsy, so not nil is true."}], "recap": "not flips true to false and vice versa."}, {"id": "l24", "number": 24, "title": "Combining Conditions", "teaches": "Building bigger condition checks without getting lost.", "idea": "You can combine comparisons with and/or/not in one if. To keep it readable, break it into the smaller questions it's really asking.", "examples": [{"code": "local level = 12\nlocal hasPass = true\n\nif level >= 10 and hasPass then\n    print(\"Can join\")\nend", "out": "Can join"}], "why": "Game rules often combine three or four conditions. Level high enough, has a key, isn't on cooldown, isn't already inside. That's one if statement with several pieces.", "method": ["Identify each separate check.", "Decide if all must be true (use and) or any (use or).", "Write each piece, then connect them."], "questions": [{"type": "predict", "prompt": "Does this print? Yes or no.", "code": "local coins = 100\nlocal isVIP = false\n\nif coins >= 100 or isVIP then\n    print(\"Buy item\")\nend", "answer": ["yes"], "explain": "coins >= 100 is true. or only needs one true side."}, {"type": "predict", "prompt": "Does this print? Yes or no.", "code": "local age = 16\nlocal hasID = false\n\nif age >= 18 and hasID then\n    print(\"ok\")\nend", "answer": ["no"], "explain": "16 isn't >= 18, so the and fails."}], "recap": "Break compound conditions into their parts. Connect with and/or."}, {"id": "l25", "number": 25, "title": "nil and Missing Values", "teaches": "What nil means.", "idea": "`nil` means no value. Unassigned variables are nil. Reading a table key that doesn't exist returns nil.", "examples": [{"code": "local pet\nprint(pet)", "out": "nil"}, {"code": "local data = {Coins = 50}\nprint(data.Level)", "out": "nil"}], "why": "A huge number of beginner bugs come from code that assumed a value was there but it was actually nil. Knowing nil exists lets you check for it.", "note": "Check for nil with `if value == nil then`, or just `if not value then` since nil is falsy.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local value = nil\nprint(value)", "answer": ["nil"], "explain": "value holds nil, print(nil) shows nil."}, {"type": "predict", "prompt": "What prints?", "code": "local t = {a = 1}\nprint(t.b)", "answer": ["nil"], "explain": "No key b, so t.b is nil."}], "recap": "nil = no value. Unassigned variables and missing table keys are nil."}, {"id": "l26", "number": 26, "title": "repeat until Loops", "teaches": "A loop that runs first, then checks the condition.", "idea": "`repeat ... until` runs the body once, then checks the condition. It stops when the condition becomes **true** (the opposite of while).", "examples": [{"code": "local count = 1\n\nrepeat\n    print(count)\n    count += 1\nuntil count > 3", "out": "1\n2\n3"}], "why": "Use it when the body needs to run at least once before the check makes sense. Prompt for input, then check if the input was valid.", "note": "`count += 1` is shorthand for `count = count + 1`. Luau supports compound forms: +=, -=, *=, /=, ..=.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local number = 2\n\nrepeat\n    print(number)\n    number += 1\nuntil number > 4", "answer": ["2\n3\n4"], "explain": "Prints 2, becomes 3, prints, becomes 4, prints, becomes 5, condition true, stops."}, {"type": "choice", "prompt": "repeat until stops when the condition becomes:", "choices": ["false", "true", "nil", "any value"], "answer": 1, "explain": "Opposite of while. repeat until stops on true."}], "recap": "repeat runs first, then checks. Stops on true."}, {"id": "l27", "number": 27, "title": "The Length Operator #", "teaches": "Counting characters or list items.", "idea": "Put `#` before a string to get its character count. Put `#` before a list-style table to get its size.", "examples": [{"code": "local word = \"Hello\"\nprint(#word)", "out": "5"}, {"code": "local items = {\"Sword\", \"Shield\", \"Potion\"}\nprint(#items)", "out": "3"}], "why": "Checking 'how long is this name?' or 'how many items in the inventory?' is one of the most common operations.", "note": "# works reliably for list tables (keys 1..n) and for strings. For tables with named keys, it doesn't count those.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local pets = {\"Dog\", \"Cat\"}\nprint(#pets)", "answer": ["2"], "explain": "Two items in the list."}, {"type": "predict", "prompt": "What prints?", "code": "print(#\"abcd\")", "answer": ["4"], "explain": "Four characters in the string."}], "recap": "# gives length of strings and list tables."}, {"id": "l28", "number": 28, "title": "table.insert() and table.remove()", "teaches": "Adding and removing items from a list.", "idea": "`table.insert(t, value)` adds a value to the end of a list. `table.remove(t, index)` removes the value at position index and shifts the rest down.", "examples": [{"code": "local items = {\"Sword\", \"Shield\"}\ntable.insert(items, \"Potion\")\nprint(items[3])", "out": "Potion"}, {"code": "local items = {\"Sword\", \"Shield\", \"Potion\"}\ntable.remove(items, 2)\nprint(items[2])", "out": "Potion"}], "why": "Lists in games change all the time. Players join. Items get picked up or dropped. These two are how you keep lists current.", "questions": [{"type": "predict", "prompt": "What prints after the remove?", "code": "local names = {\"Ava\", \"Ben\", \"Chris\"}\ntable.remove(names, 1)\nprint(names[1])", "answer": ["Ben"], "explain": "Removing position 1 ('Ava') shifts everything down. 'Ben' is now at position 1."}, {"type": "predict", "prompt": "What prints?", "code": "local arr = {\"a\", \"b\"}\ntable.insert(arr, \"c\")\nprint(#arr)", "answer": ["3"], "explain": "After insert, the list has 3 items."}], "recap": "table.insert adds at the end. table.remove deletes by index."}, {"id": "l29", "number": 29, "title": "ipairs() vs pairs()", "teaches": "The two main loops over tables.", "idea": "`ipairs(t)` walks a list-style table in numerical order. `pairs(t)` walks any table, including named keys, but doesn't guarantee order.", "examples": [{"code": "local fruits = {\"Apple\", \"Banana\", \"Pear\"}\n\nfor index, fruit in ipairs(fruits) do\n    print(index, fruit)\nend", "out": "1 Apple\n2 Banana\n3 Pear"}, {"code": "local playerData = {Name = \"Alex\", Coins = 50}\n\nfor key, value in pairs(playerData) do\n    print(key, value)\nend", "out": "Name Alex\nCoins 50"}], "why": "Use ipairs when order matters (the table is a list, position counts). Use pairs when the table has named keys.", "note": "pairs gives keys and values in whatever order Luau decides. Usually insertion order, but don't rely on it. If you need a specific order, sort first.", "questions": [{"type": "choice", "prompt": "Which loop for `local pets = {\"Dog\", \"Cat\", \"Bird\"}`?", "choices": ["ipairs", "pairs", "either works fine", "neither"], "answer": 0, "explain": "List-style table, so ipairs."}, {"type": "choice", "prompt": "Which loop for `local data = {Name = \"A\", HP = 100}`?", "choices": ["ipairs", "pairs", "either works", "neither"], "answer": 1, "explain": "Named keys, so pairs. ipairs wouldn't see these at all."}], "recap": "ipairs for ordered lists. pairs for named keys."}, {"id": "l30", "number": 30, "title": "Scope and Debugging with print()", "teaches": "Where variables live, and the simplest debugging tool.", "idea": "Scope is the region of code where a variable is visible. A `local` variable defined inside a function or block only exists there. When something seems wrong, sprinkle print() calls to see what your code actually has.", "examples": [{"code": "local function test()\n    local number = 5\n    print(number)\nend\n\ntest()\n-- print(number) outside test() would error: 'number' is local to test()", "out": "5"}, {"code": "local coins = 10\nprint(\"Before:\", coins)\ncoins -= 3\nprint(\"After:\", coins)", "out": "Before: 10\nAfter: 7"}], "why": "Two failure modes account for most beginner bugs: a value isn't what you expected, or you used a variable that doesn't exist in this scope. Print finds the first. Understanding scope avoids the second.", "questions": [{"type": "choice", "prompt": "Why is print() useful while learning?", "choices": ["It makes code run faster", "It lets you see actual values at any point", "It changes variables", "It removes errors"], "answer": 1, "explain": "print() is the simplest window into what your code really has."}, {"type": "choice", "prompt": "What is scope?", "choices": ["A keyword in Luau", "The region of code where a variable exists", "A type of loop", "An error message"], "answer": 1, "explain": "Scope is where a variable is reachable. local variables are scoped to the block they're in."}], "recap": "Scope: where a variable exists. print: the simplest debugger."}], "review": {"title": "Module 2 Checkpoint", "blurb": "These are the small ideas that trip people up. Make sure all of them are second nature before continuing.", "questions": [{"type": "choice", "prompt": "In Luau, which of these is falsy?", "choices": ["0", "\"\"", "{}", "nil"], "answer": 3, "explain": "Only false and nil are falsy. (Lesson 20)"}, {"type": "predict", "prompt": "What prints?", "code": "local greeting = \"Hi\"\nlocal who = \"Sam\"\nprint(greeting .. \", \" .. who)", "answer": ["Hi, Sam"], "explain": "Joined with .. (Lesson 18)"}, {"type": "predict", "prompt": "What prints?", "code": "local a = true\nlocal b = false\nprint(a and not b)", "answer": ["true"], "explain": "not b is true. true and true is true. (Lessons 21-23)"}, {"type": "predict", "prompt": "What prints?", "code": "local x\nprint(x)", "answer": ["nil"], "explain": "Unassigned local variables are nil. (Lesson 25)"}, {"type": "choice", "prompt": "Which loop for `local stats = {HP=100, Speed=8}`?", "choices": ["for i, v in ipairs(stats) do", "for k, v in pairs(stats) do", "for i = 1, #stats do", "for v in stats do"], "answer": 1, "explain": "Named keys, so pairs. (Lesson 29)"}, {"type": "predict", "prompt": "What prints?", "code": "local arr = {\"a\", \"b\", \"c\"}\ntable.insert(arr, \"d\")\ntable.remove(arr, 1)\nprint(arr[1], arr[3])", "answer": ["b d"], "explain": "After insert: a,b,c,d. After remove(1): b,c,d. (Lesson 28)"}, {"type": "predict", "prompt": "What prints?", "code": "local s = \"hello\"\nprint(#s)", "answer": ["5"], "explain": "5 characters. (Lesson 27)"}]}}, {"id": "m3", "number": 3, "title": "Deeper Patterns", "subtitle": "Lessons 31-45 · Strings, Tables, Real Code", "hours": 8, "intro": "More serious tools now. String functions for working with text. A table behavior nobody warns you about (references vs copies). Nested data. Functions that change tables on purpose. The last lesson combines six earlier ideas in one small piece of real code.", "lessons": [{"id": "l31", "number": 31, "title": "string.lower() and string.upper()", "teaches": "Changing text case.", "idea": "`string.lower(text)` returns the text in all lowercase. `string.upper(text)` returns it in all uppercase. Neither changes the original — they return new strings.", "examples": [{"code": "local word = \"Hello\"\nprint(string.lower(word))\nprint(string.upper(word))", "out": "hello\nHELLO"}, {"code": "local answer = \"YES\"\n\nif string.lower(answer) == \"yes\" then\n    print(\"Matched\")\nend", "out": "Matched"}], "why": "Comparing text where the case varies is annoying. Force both sides to the same case first, then compare.", "note": "These return a new string. To save the change, write it back: `word = string.lower(word)`.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local name = \"alex\"\nprint(string.upper(name))", "answer": ["ALEX"], "explain": "All letters become uppercase."}, {"type": "predict", "prompt": "Does this print 'match'?", "code": "local input = \"Yes\"\nif string.lower(input) == \"yes\" then\n    print(\"match\")\nend", "answer": ["match"], "explain": "lower('Yes') is 'yes'. Match."}], "recap": "Lower or upper a string. Use them before comparing to ignore case."}, {"id": "l32", "number": 32, "title": "string.sub()", "teaches": "Taking a piece of a string.", "idea": "`string.sub(text, startIndex, endIndex)` returns a slice from start to end, inclusive. Positions start at 1. Leave off endIndex and it goes to the end.", "examples": [{"code": "local word = \"Roblox\"\nprint(string.sub(word, 1, 3))", "out": "Rob"}, {"code": "local word = \"Roblox\"\nprint(string.sub(word, 4))", "out": "lox"}], "why": "Chopping off prefixes, taking initials, peeking at the first few characters — all string.sub.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local text = \"Builder\"\nprint(string.sub(text, 1, 4))", "answer": ["Buil"], "explain": "Positions 1 to 4: B, u, i, l."}, {"type": "predict", "prompt": "What prints?", "code": "print(string.sub(\"HelloWorld\", 6))", "answer": ["World"], "explain": "From position 6 to the end."}], "recap": "string.sub(text, start, end) returns a slice."}, {"id": "l33", "number": 33, "title": "string.find()", "teaches": "Searching for text inside text.", "idea": "`string.find(text, target, 1, true)` returns the start and end positions of target in text, or nil if not found. The `1, true` means 'start at position 1, search as plain text'.", "examples": [{"code": "local message = \"Find the key\"\nlocal s, e = string.find(message, \"key\", 1, true)\nprint(s, e)", "out": "10 12"}, {"code": "local message = \"Find the key\"\nlocal s, e = string.find(message, \"door\", 1, true)\nprint(s, e)", "out": "nil nil"}], "why": "Anywhere you need to know if a string contains some substring, and where.", "note": "The `true` argument disables pattern matching (covered later). For literal text searches, always pass true. It saves you from weird errors when your search string happens to contain `.`, `?`, `*`, or `%`.", "questions": [{"type": "predict", "prompt": "What does this print?", "code": "local text = \"Silver Sword\"\n\nif string.find(text, \"Sword\", 1, true) then\n    print(\"Found it\")\nend", "answer": ["Found it"], "explain": "find returns positions (truthy), so the if runs."}, {"type": "predict", "prompt": "What does this print?", "code": "print(string.find(\"abc\", \"xyz\", 1, true))", "answer": ["nil"], "explain": "Not found, so find returns nil."}], "recap": "string.find returns positions when found, nil when not. Use `1, true` for plain text."}, {"id": "l34", "number": 34, "title": "string.split() and table.concat()", "teaches": "Breaking strings apart and joining them back.", "idea": "`string.split(text, separator)` cuts text into pieces wherever the separator appears, returning a table. `table.concat(t, separator)` joins a table of strings into one string.", "examples": [{"code": "local colors = string.split(\"Red,Blue,Green\", \",\")\nprint(colors[1])\nprint(colors[2])\nprint(colors[3])", "out": "Red\nBlue\nGreen"}, {"code": "local words = {\"Luau\", \"is\", \"fun\"}\nprint(table.concat(words, \" \"))", "out": "Luau is fun"}], "why": "CSV-like data comes in as one string and needs to be split. Assembling a single line from a list happens just as often.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local pieces = string.split(\"A-B-C\", \"-\")\nprint(pieces[2])", "answer": ["B"], "explain": "Split on '-' gives {'A', 'B', 'C'}. Index 2 is 'B'."}, {"type": "predict", "prompt": "What prints?", "code": "print(table.concat({\"x\", \"y\", \"z\"}, \"-\"))", "answer": ["x-y-z"], "explain": "Joins each piece with '-' between."}], "recap": "split breaks a string apart. concat puts pieces back together."}, {"id": "l35", "number": 35, "title": "Tables Are References", "teaches": "The hidden table behavior that catches everyone.", "idea": "Assigning a table to another variable doesn't make a copy. Both names refer to the same table. Modifying through one shows up through the other, because there's only one table.", "examples": [{"code": "local first = {\"Sword\", \"Shield\"}\nlocal second = first\n\nsecond[1] = \"Bow\"\n\nprint(first[1])\nprint(second[1])", "out": "Bow\nBow"}], "why": "This catches every beginner once. A function that takes a table can change the caller's table. That can be exactly what you want, or a confusing bug, depending on whether you knew it was happening.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local a = {10, 20}\nlocal b = a\n\nb[2] = 99\nprint(a[2])", "answer": ["99"], "explain": "b isn't a copy. b and a point to the same table."}, {"type": "choice", "prompt": "After `local x = {1, 2, 3}; local y = x; y[1] = 100`, what is x[1]?", "choices": ["1", "100", "nil", "error"], "answer": 1, "explain": "Same table. Modifying through y is visible through x."}], "recap": "Tables are shared by reference. Assignment doesn't copy."}, {"id": "l36", "number": 36, "title": "table.clone() for Simple Copies", "teaches": "Making a separate top-level copy.", "idea": "`table.clone(t)` returns a new table with the same top-level contents. The two are independent — changing one doesn't affect the other.", "examples": [{"code": "local original = {\"Sword\", \"Shield\"}\nlocal copy = table.clone(original)\n\ncopy[1] = \"Bow\"\n\nprint(original[1])\nprint(copy[1])", "out": "Sword\nBow"}], "why": "When you need a snapshot of a table that won't change when the original changes, clone first.", "note": "Clone is shallow. Nested tables inside the cloned one are still shared. Deep copies need a recursive helper.", "questions": [{"type": "predict", "prompt": "What prints, two lines?", "code": "local values = {1, 2, 3}\nlocal other = table.clone(values)\n\nother[3] = 50\nprint(values[3])\nprint(other[3])", "answer": ["3\n50"], "explain": "Clone made other independent. Changing other[3] doesn't affect values[3]."}], "recap": "table.clone makes a top-level copy. Independent at the top, shared underneath."}, {"id": "l37", "number": 37, "title": "Nested Tables", "teaches": "Tables inside other tables.", "idea": "A table can hold other tables as values. To reach deeper levels, chain the dots: `playerData.Stats.Coins` reads playerData, then its Stats field, then that table's Coins field.", "examples": [{"code": "local playerData = {\n    Name = \"Alex\",\n    Stats = {\n        Coins = 25,\n        Level = 4\n    }\n}\n\nprint(playerData.Name)\nprint(playerData.Stats.Coins)", "out": "Alex\n25"}], "why": "Real game data is almost always shaped this way. A player has stats. Stats has coins, level, health. Inventory is a separate field. Nesting matches the shape of the data.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local petData = {\n    Name = \"Milo\",\n    Info = {\n        Age = 3\n    }\n}\n\nprint(petData.Info.Age)", "answer": ["3"], "explain": "Step into Info, read Age."}], "recap": "Tables nest. Chain dots to dig in."}, {"id": "l38", "number": 38, "title": "Looping Through Nested Tables", "teaches": "Reading grouped data with loops.", "idea": "A common shape is a list of items where each item is a table with named fields. Loop through the outer list with ipairs, then read each inner table's fields.", "examples": [{"code": "local players = {\n    {Name = \"Alex\", Coins = 10},\n    {Name = \"Sam\", Coins = 25},\n    {Name = \"Jordan\", Coins = 40}\n}\n\nfor _, player in ipairs(players) do\n    print(player.Name, player.Coins)\nend", "out": "Alex 10\nSam 25\nJordan 40"}], "why": "Almost every meaningful piece of game data ends up shaped like this. A list of players, each with name, score, level. A list of items, each with name and price.", "note": "`_` is the convention for 'I don't care about this variable'. Here, we use it for the index since we just want the player table, not the position.", "questions": [{"type": "predict", "prompt": "What prints, one per line?", "code": "local items = {\n    {Name = \"Potion\", Price = 5},\n    {Name = \"Sword\", Price = 20}\n}\n\nfor _, item in ipairs(items) do\n    print(item.Name)\nend", "answer": ["Potion\nSword"], "explain": "Loop walks each inner table and prints its Name."}], "recap": "Outer loop walks the list. Inside, read each table's fields by name."}, {"id": "l39", "number": 39, "title": "break", "teaches": "Stopping a loop early.", "idea": "`break` ends the current loop immediately. Code after the loop continues.", "examples": [{"code": "local numbers = {4, 8, 12, 16}\n\nfor _, value in ipairs(numbers) do\n    print(value)\n\n    if value == 12 then\n        break\n    end\nend", "out": "4\n8\n12"}], "why": "Once you've found what you were looking for, no reason to keep searching. break exits.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "for i = 1, 5 do\n    print(i)\n    if i == 2 then\n        break\n    end\nend", "answer": ["1\n2"], "explain": "Prints 1, prints 2, hits break. 3, 4, 5 never run."}, {"type": "choice", "prompt": "What does break do?", "choices": ["Pauses the loop", "Skips the current iteration", "Ends the entire loop immediately", "Restarts the loop"], "answer": 2, "explain": "break exits the loop. To skip just one iteration, use continue (next lesson)."}], "recap": "break ends the loop right away."}, {"id": "l40", "number": 40, "title": "continue", "teaches": "Skipping the rest of one iteration.", "idea": "`continue` skips the remaining code in the current iteration and moves to the next one. The loop itself keeps going.", "examples": [{"code": "local numbers = {2, -1, 5, -3, 9}\n\nfor _, value in ipairs(numbers) do\n    if value < 0 then\n        continue\n    end\n\n    print(value)\nend", "out": "2\n5\n9"}], "why": "Useful for filtering inside a loop. 'Skip the negative values' — continue jumps past the rest of the body for those iterations.", "note": "break stops the loop. continue skips one iteration. Different.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "for i = 1, 4 do\n    if i == 3 then\n        continue\n    end\n    print(i)\nend", "answer": ["1\n2\n4"], "explain": "Prints 1, 2, skips 3, prints 4."}], "recap": "continue: skip this iteration. break: end the loop."}, {"id": "l41", "number": 41, "title": "return Stops a Function Early", "teaches": "Using return to bail out.", "idea": "`return` does two things: it sends a value back, and it ends the function. The second part is useful even when you have no value to return — use `return` by itself to exit early.", "examples": [{"code": "local function checkAge(age)\n    if age < 13 then\n        print(\"Too young\")\n        return\n    end\n\n    print(\"Allowed\")\nend\n\ncheckAge(10)\ncheckAge(15)", "out": "Too young\nAllowed"}], "why": "Handle bad cases at the top, then assume good data for the rest of the function. Much easier to read than nesting if/else around the whole body.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function test(value)\n    if value == 0 then\n        return\n    end\n\n    print(\"Not zero\")\nend\n\ntest(0)\ntest(2)", "answer": ["Not zero"], "explain": "test(0) returns early before the print. test(2) doesn't."}], "recap": "return ends the function. Use it to bail out early."}, {"id": "l42", "number": 42, "title": "Functions That Change Tables", "teaches": "Modifying a table you pass in.", "idea": "Because tables are references (Lesson 35), a function that takes a table can change it. The function doesn't need to return anything — modifying the parameter is enough.", "examples": [{"code": "local function addCoins(playerData, amount)\n    playerData.Coins += amount\nend\n\nlocal player = {Name = \"Alex\", Coins = 10}\n\naddCoins(player, 5)\nprint(player.Coins)", "out": "15"}], "why": "Most state changes in real code work this way. A function takes a player table, updates one of its fields, and the caller sees the change because both point to the same table.", "note": "The power is also a footgun. Name your functions clearly so the side effect is visible from the call. `addCoins(player, 10)` reads as a change. `getThing(player)` shouldn't change anything.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function rename(data, newName)\n    data.Name = newName\nend\n\nlocal item = {Name = \"Old\"}\nrename(item, \"New\")\nprint(item.Name)", "answer": ["New"], "explain": "rename changes item.Name directly because data and item point to the same table."}], "recap": "Functions can modify tables they receive. Name them to make the side effect obvious."}, {"id": "l43", "number": 43, "title": "Multiple Return Values", "teaches": "Returning more than one value.", "idea": "Luau lets a function return several values at once. Catch them with multiple variables: `local a, b = fn()`.", "examples": [{"code": "local function getNameAndLevel()\n    return \"Alex\", 12\nend\n\nlocal name, level = getNameAndLevel()\nprint(name)\nprint(level)", "out": "Alex\n12"}], "why": "Some functions naturally produce two related values — start and end of a match, value and an error message, item and its position. Multiple returns is cleaner than wrapping them in a table.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function getStats()\n    return 50, 8\nend\n\nlocal health, speed = getStats()\nprint(speed)", "answer": ["8"], "explain": "First return is health (50), second is speed (8). We print speed."}], "recap": "Functions can return multiple values. Catch them with multiple variables."}, {"id": "l44", "number": 44, "title": "ModuleScripts the Cleaner Way", "teaches": "The standard module shape.", "idea": "One table at the top. Helper functions attached to it. Return the table at the bottom. Other scripts require the module and call functions on the returned table.", "examples": [{"code": "-- ModuleScript named ItemTools\nlocal ItemTools = {}\n\nfunction ItemTools.getDisplayName(name)\n    return string.upper(name)\nend\n\nfunction ItemTools.isCheap(price)\n    return price < 10\nend\n\nreturn ItemTools", "out": "(module defined)"}, {"code": "-- A different script\nlocal ItemTools = require(script.Parent.ItemTools)\n\nprint(ItemTools.getDisplayName(\"potion\"))\nprint(ItemTools.isCheap(5))", "out": "POTION\ntrue"}], "why": "Keeps related helpers grouped, exposes them under one name. By far the most common module shape in real Roblox codebases.", "questions": [{"type": "predict", "prompt": "If a module has a function double that returns number * 2, what does double(6) return?", "code": "ItemTools.double(6)", "answer": ["12"], "explain": "Just a regular function call. The module is just where it lives."}, {"type": "choice", "prompt": "What does a module need at the very bottom?", "choices": ["nothing", "an end", "return <theTable>", "a print"], "answer": 2, "explain": "Return the table you want to expose, so require() can give it back."}], "recap": "Make a table, attach functions, return the table."}, {"id": "l45", "number": 45, "title": "Putting It Together", "teaches": "Six earlier ideas combined into one small helper.", "idea": "Up to here, lessons have introduced tools one at a time. Real code mixes them. Here's a small module that finds an item by name in a list, ignoring case.", "examples": [{"code": "-- ModuleScript: ItemTools\nlocal ItemTools = {}\n\nfunction ItemTools.findItemByName(items, wantedName)\n    local wanted = string.lower(wantedName)\n\n    for _, item in ipairs(items) do\n        if string.lower(item.Name) ~= wanted then\n            continue\n        end\n\n        return item\n    end\n\n    return nil\nend\n\nreturn ItemTools", "out": "(module defined)"}, {"code": "-- Using it\nlocal ItemTools = require(script.Parent.ItemTools)\n\nlocal items = {\n    {Name = \"Potion\", Price = 5},\n    {Name = \"Sword\", Price = 20}\n}\n\nlocal found = ItemTools.findItemByName(items, \"potion\")\n\nif found then\n    print(found.Name, found.Price)\nelse\n    print(\"Not found\")\nend", "out": "Potion 5"}], "why": "Six earlier ideas do work in this one function: string.lower for case-insensitive matching, ipairs to walk the list, continue to skip non-matches, return inside the loop to exit on the first hit, nil as the 'not found' answer, the standard module shape. Reading code that combines techniques is how programming actually looks
