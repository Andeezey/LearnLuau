.", "questions": [{"type": "choice", "prompt": "If the item name isn't found, the function returns:", "choices": ["false", "0", "\"\"", "nil"], "answer": 3, "explain": "The last line is `return nil`. nil is the standard 'not found' marker."}, {"type": "choice", "prompt": "Why lowercase both sides before comparing?", "choices": ["Faster code", "So 'potion' and 'POTION' both match", "Required by Luau", "Saves memory"], "answer": 1, "explain": "Case-insensitive comparison."}], "recap": "Most code is several tools used together. Get used to combining them."}], "review": {"title": "Module 3 Checkpoint", "blurb": "Tables, strings, control flow — what you'll use every day. Don't move on until these are reflexive.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local a = {1, 2, 3}\nlocal b = a\nb[1] = 99\nprint(a[1])", "answer": ["99"], "explain": "Tables are references. (Lesson 35)"}, {"type": "predict", "prompt": "What prints?", "code": "local a = {1, 2}\nlocal b = table.clone(a)\nb[1] = 99\nprint(a[1])", "answer": ["1"], "explain": "clone made b independent. (Lesson 36)"}, {"type": "predict", "prompt": "What prints, one line?", "code": "for i = 1, 5 do\n    if i == 3 then continue end\n    if i == 4 then break end\n    print(i)\nend", "answer": ["1\n2"], "explain": "Prints 1, prints 2, skips 3, i=4 breaks. (Lessons 39-40)"}, {"type": "predict", "prompt": "What prints?", "code": "local function safeDivide(a, b)\n    if b == 0 then return nil end\n    return a / b\nend\nprint(safeDivide(10, 0))", "answer": ["nil"], "explain": "Early return with nil. (Lesson 41)"}, {"type": "predict", "prompt": "What prints?", "code": "local function pair() return 3, 4 end\nlocal x, y = pair()\nprint(x + y)", "answer": ["7"], "explain": "Multiple return values. (Lesson 43)"}, {"type": "predict", "prompt": "What prints?", "code": "print(string.sub(\"Adventure\", 1, 4))", "answer": ["Adve"], "explain": "First 4 characters. (Lesson 32)"}]}}, {"id": "m4", "number": 4, "title": "Strong Patterns", "subtitle": "Lessons 46-60 · Clean Code and Safe Code", "hours": 12, "intro": "These fifteen lessons cover the patterns that show up over and over in real Roblox code: lookup tables, default values, safe nested reads, sorting, formatting, closures, error handling, and types. From here on, almost every project uses several of these together.", "lessons": [{"id": "l46", "number": 46, "title": "Lookup Tables for Fast Checks", "teaches": "Using a table as a set.", "idea": "Store the things you want to check as keys with `true` as the value. Then `set[item]` answers 'is this in the set?' without a loop.", "examples": [{"code": "local unlocked = {\n    Sword = true,\n    Shield = true,\n    Bow = false\n}\n\nprint(unlocked.Sword)\nprint(unlocked.Bow)\nprint(unlocked.Axe)", "out": "true\nfalse\nnil"}, {"code": "local allowedRanks = {Admin = true, Moderator = true}\n\nlocal rank = \"Admin\"\n\nif allowedRanks[rank] then\n    print(\"Access granted\")\nend", "out": "Access granted"}], "why": "If you find yourself writing `if x == \"a\" or x == \"b\" or x == \"c\" or ...`, a lookup table is the answer. Cleaner, faster, easier to update.", "note": "Missing keys return nil, which is falsy. So `if lookup[key] then` works whether the entry is missing or false-vs-true.", "questions": [{"type": "predict", "prompt": "What prints, two lines?", "code": "local ownedPets = {Dog = true, Cat = true}\nprint(ownedPets.Dog)\nprint(ownedPets.Bird)", "answer": ["true\nnil"], "explain": "Dog is in the table with true. Bird isn't, so the key returns nil."}], "recap": "Lookup table = keys with true values. Fast set-style checks."}, {"id": "l47", "number": 47, "title": "Default Values with or", "teaches": "Using or as a fallback.", "idea": "`a or b` returns `a` if a is truthy, otherwise b. Standard Luau idiom for default values.", "examples": [{"code": "local title = nil\nlocal shownTitle = title or \"No Title\"\nprint(shownTitle)", "out": "No Title"}, {"code": "local coins = nil\nlocal safeCoins = coins or 0\nprint(safeCoins)", "out": "0"}], "why": "Avoids writing if/else just to pick a fallback. Reads naturally: 'name or Unknown'.", "note": "Be careful with false. `local visible = userPref or true` gives true even if userPref was explicitly false. For booleans that can legitimately be false, check for nil specifically.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local teamName = false\nlocal shownTeam = teamName or \"No Team\"\nprint(shownTeam)", "answer": ["No Team"], "explain": "false is falsy, so or returns the right side."}, {"type": "predict", "prompt": "What prints?", "code": "local name = \"Alex\"\nlocal display = name or \"Guest\"\nprint(display)", "answer": ["Alex"], "explain": "'Alex' is truthy, so or returns the left side."}], "recap": "value or default. Standard idiom."}, {"id": "l48", "number": 48, "title": "Reading Nested Data Safely", "teaches": "Avoiding errors when data might be missing.", "idea": "Trying to read `data.A.B` when `data.A` is nil errors out: 'attempt to index nil with B'. Fix it by checking each layer before going deeper.", "examples": [{"code": "local playerData = {Stats = {Coins = 50}}\n\nif playerData.Stats then\n    print(playerData.Stats.Coins)\nend", "out": "50"}, {"code": "local saveData = {}\n\nif saveData.Stats then\n    print(saveData.Stats.Level)\nelse\n    print(\"No stats yet\")\nend", "out": "No stats yet"}], "why": "Save data, network responses, and config data can be partial. Code that drills in without checking will crash. Defensive reads keep the script alive.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local profile = {\n    Settings = {Music = true}\n}\n\nif profile.Settings then\n    print(profile.Settings.Music)\nend", "answer": ["true"], "explain": "Settings exists, so we can read Music safely."}], "recap": "Check outer values before reading nested ones."}, {"id": "l49", "number": 49, "title": "table.find()", "teaches": "Searching for a value in a list.", "idea": "`table.find(t, value)` walks a list and returns the position of the first match, or nil if not found.", "examples": [{"code": "local fruits = {\"Apple\", \"Banana\", \"Pear\"}\nlocal position = table.find(fruits, \"Banana\")\nprint(position)", "out": "2"}, {"code": "local fruits = {\"Apple\", \"Banana\", \"Pear\"}\nlocal position = table.find(fruits, \"Orange\")\nprint(position)", "out": "nil"}], "why": "Cleaner than writing the loop yourself.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local items = {\"Sword\", \"Shield\", \"Potion\"}\nprint(table.find(items, \"Potion\"))", "answer": ["3"], "explain": "'Potion' is at index 3."}], "recap": "table.find returns the position of a value, or nil."}, {"id": "l50", "number": 50, "title": "table.sort()", "teaches": "Sorting a list in place.", "idea": "`table.sort(t)` reorders the list in place — low to high for numbers, A to Z for strings. It changes the table, not a copy.", "examples": [{"code": "local numbers = {8, 2, 5, 1}\n\ntable.sort(numbers)\n\nprint(numbers[1])\nprint(numbers[2])\nprint(numbers[3])\nprint(numbers[4])", "out": "1\n2\n5\n8"}, {"code": "local names = {\"Sam\", \"Alex\", \"Chris\"}\ntable.sort(names)\nprint(names[1], names[2], names[3])", "out": "Alex Chris Sam"}], "why": "Leaderboards, inventories, anything where order matters.", "questions": [{"type": "predict", "prompt": "What prints, two lines?", "code": "local letters = {\"C\", \"A\", \"B\"}\ntable.sort(letters)\nprint(letters[1])\nprint(letters[3])", "answer": ["A\nC"], "explain": "After sorting: A, B, C. First is A, third is C."}], "recap": "table.sort reorders in place."}, {"id": "l51", "number": 51, "title": "Custom Sorting with Anonymous Functions", "teaches": "Choosing your own sort order.", "idea": "Pass a function as the second argument to table.sort. The function takes two values, a and b, and returns true when a should come before b.", "examples": [{"code": "local scores = {15, 40, 22, 9}\n\ntable.sort(scores, function(a, b)\n    return a > b\nend)\n\nprint(scores[1], scores[2], scores[3], scores[4])", "out": "40 22 15 9"}, {"code": "local words = {\"ant\", \"hippopotamus\", \"cat\"}\n\ntable.sort(words, function(a, b)\n    return #a < #b\nend)\n\nprint(words[1], words[2], words[3])", "out": "ant cat hippopotamus"}], "why": "Default sort is rarely what you want. Highest score first. Cheapest item first. Sorted by a specific field. All need a custom comparator.", "note": "An anonymous function is a function with no name, written inline. It's a value like any other, so you can pass it directly to other functions.", "questions": [{"type": "predict", "prompt": "What is levels[1] after sorting?", "code": "local levels = {3, 1, 2}\n\ntable.sort(levels, function(a, b)\n    return a > b\nend)\n\nprint(levels[1])", "answer": ["3"], "explain": "a > b sorts descending. The largest comes first."}], "recap": "Pass a function to table.sort. Return true when a should come before b."}, {"id": "l52", "number": 52, "title": "string.format()", "teaches": "Building strings with placeholders.", "idea": "`string.format(template, ...)` substitutes values into placeholders. `%s` for strings, `%d` for integers, `%f` for floats.", "examples": [{"code": "local playerName = \"Alex\"\nlocal coins = 25\n\nlocal message = string.format(\"%s has %d coins\", playerName, coins)\nprint(message)", "out": "Alex has 25 coins"}, {"code": "local item = \"Potion\"\nlocal amount = 3\nprint(string.format(\"You got %d %s\", amount, item))", "out": "You got 3 Potion"}], "why": "Cleaner than chaining `..` when several values mix with text. Also lets you control how numbers display (decimal places, padding, etc).", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local winner = \"Sam\"\nprint(string.format(\"Winner: %s\", winner))", "answer": ["Winner: Sam"], "explain": "%s gets replaced with 'Sam'."}], "recap": "string.format builds text from a template plus values."}, {"id": "l53", "number": 53, "title": "Escapes and Multiline Strings", "teaches": "Special characters inside strings.", "idea": "Some characters need special syntax inside strings. `\\n` is a newline. `\\t` is a tab. `\\\"` is a literal quote. Double square brackets `[[ ]]` let you write strings that span multiple lines without escapes.", "examples": [{"code": "local text = \"Line 1\\nLine 2\"\nprint(text)", "out": "Line 1\nLine 2"}, {"code": "local quote = \"She said, \\\"Hello\\\"\"\nprint(quote)", "out": "She said, \"Hello\""}, {"code": "local message = [[Welcome\nto the shop]]\nprint(message)", "out": "Welcome\nto the shop"}], "why": "Logs, multi-line messages, paths with quotes — they all need these eventually.", "questions": [{"type": "predict", "prompt": "What prints, two lines?", "code": "local text = \"A\\nB\"\nprint(text)", "answer": ["A\nB"], "explain": "\\n is a newline."}], "recap": "\\n newline, \\t tab, \\\" quote. [[ ]] for multiline."}, {"id": "l54", "number": 54, "title": "Methods and the Colon", "teaches": "How : differs from . and why methods use it.", "idea": "When you call a function on a table with `:`, Luau passes the table itself as the first argument, named `self`. That's how methods work.", "examples": [{"code": "local Tool = {}\n\nfunction Tool.show(self)\n    print(self.Name)\nend\n\nlocal sword = {Name = \"Iron Sword\"}\nTool.show(sword)", "out": "Iron Sword"}, {"code": "local Tool = {}\n\nfunction Tool:show()\n    print(self.Name)\nend\n\nlocal sword = {Name = \"Iron Sword\"}\nTool.show(sword)\nTool:show()", "out": "Iron Sword\n(error — sword isn't the table being called on)"}], "why": "Methods make code read more naturally. `player:Move()` is cleaner than `Player.Move(player)`. The colon is just a shorthand for passing self.", "note": "Two rules: `function Obj:method()` is the same as `function Obj.method(self)`. And `obj:method()` is the same as `obj.method(obj)`. The colon fills in self automatically.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local Pet = {Name = \"Dog\"}\n\nfunction Pet:speak()\n    print(self.Name)\nend\n\nPet:speak()", "answer": ["Dog"], "explain": "Pet:speak() passes Pet as self. self.Name is 'Dog'."}], "recap": ": automatically passes the table as self."}, {"id": "l55", "number": 55, "title": "Functions Stored Inside Tables", "teaches": "Functions are values.", "idea": "In Luau, a function is a value like a number or a string. You can store one in a variable, in a table, or return it from another function.", "examples": [{"code": "local Actions = {}\n\nActions.jump = function()\n    print(\"Jump\")\nend\n\nActions.run = function()\n    print(\"Run\")\nend\n\nActions.jump()\nActions.run()", "out": "Jump\nRun"}, {"code": "local Calculator = {}\n\nCalculator.add = function(a, b)\n    return a + b\nend\n\nprint(Calculator.add(4, 6))", "out": "10"}], "why": "Once functions are values, a lot opens up. Modules return tables of functions. Callbacks work because functions can be passed as arguments. Higher-order patterns become possible.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local Sounds = {}\nSounds.play = function() print(\"Playing\") end\nSounds.play()", "answer": ["Playing"], "explain": "Sounds.play is a function, called normally."}], "recap": "Functions are values. They can live anywhere other values can."}, {"id": "l56", "number": 56, "title": "Closures", "teaches": "Functions that remember their surroundings.", "idea": "When a function is defined inside another function, the inner function captures the outer function's local variables. Even after the outer function returns, the inner function still has access to those captured variables.", "examples": [{"code": "local function makeCounter()\n    local count = 0\n\n    return function()\n        count = count + 1\n        return count\n    end\nend\n\nlocal counter = makeCounter()\nprint(counter())\nprint(counter())\nprint(counter())", "out": "1\n2\n3"}, {"code": "local function makeAdder(amount)\n    return function(value)\n        return value + amount\n    end\nend\n\nlocal addFive = makeAdder(5)\nprint(addFive(10))", "out": "15"}], "why": "Closures give a function its own private state. Counters, configurators, event handlers that remember setup info — all use this.", "note": "Each call to the outer function creates a fresh set of captured variables. Two counters made from the same factory don't share their counts.", "questions": [{"type": "predict", "prompt": "What prints from the third counter() call?", "code": "local function makeCounter()\n    local count = 0\n    return function()\n        count = count + 1\n        return count\n    end\nend\n\nlocal counter = makeCounter()\ncounter()\ncounter()\nprint(counter())", "answer": ["3"], "explain": "Each call increments the captured count."}], "recap": "Closures: functions that remember the locals around their definition."}, {"id": "l57", "number": 57, "title": "assert()", "teaches": "Stopping code when an invariant is broken.", "idea": "`assert(value, message)` checks value. If truthy, code continues. If falsy (false or nil), Luau raises an error with the message.", "examples": [{"code": "local coins = 10\nassert(coins >= 0, \"Coins cannot be negative\")\nprint(\"Passed\")", "out": "Passed"}, {"code": "local username = \"\"\nassert(username ~= \"\", \"Username is required\")\nprint(\"This line will not run\")", "out": "(error: Username is required)"}], "why": "Put assert at the top of functions to enforce assumptions. If the assumption is wrong, you find out immediately with a clear message instead of seeing weird behavior downstream.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local level = 5\nassert(level > 0, \"Invalid level\")\nprint(\"Level is valid\")", "answer": ["Level is valid"], "explain": "level > 0 is true, so assert passes silently and the next line runs."}], "recap": "assert(condition, message). Errors if the condition is falsy."}, {"id": "l58", "number": 58, "title": "pcall()", "teaches": "Running risky code without crashing.", "idea": "`pcall(fn)` runs a function in protected mode. It returns two values: success (true on normal return, false if an error happened) and either the result or the error message.", "examples": [{"code": "local success, result = pcall(function()\n    return 10 / 2\nend)\n\nprint(success)\nprint(result)", "out": "true\n5"}, {"code": "local success, result = pcall(function()\n    error(\"Something went wrong\")\nend)\n\nprint(success)\nprint(result)", "out": "false\nSomething went wrong"}], "why": "Some operations can fail — DataStore reads, HTTP requests, parsing user input. pcall lets you handle the failure cleanly instead of letting the script crash.", "note": "An unhandled error stops the script. pcall catches it, so your code keeps running and you decide what to do next (retry, log, show a friendly message).", "questions": [{"type": "predict", "prompt": "What is the first thing printed?", "code": "local success, result = pcall(function()\n    error(\"Bad data\")\nend)\n\nprint(success)", "answer": ["false"], "explain": "Error happened, so pcall returns success = false."}], "recap": "pcall = protected call. Catches errors. success is true on normal return, false on error."}, {"id": "l59", "number": 59, "title": "type() and typeof()", "teaches": "Asking what kind of value you have.", "idea": "`type(value)` returns the basic Luau type as a string: 'string', 'number', 'boolean', 'nil', 'function', 'table', 'thread'. `typeof(value)` is a Roblox extension that also recognizes Roblox types like Vector3 and CFrame.", "examples": [{"code": "local value = \"Hello\"\nprint(type(value))\nprint(type(25))\nprint(type(true))", "out": "string\nnumber\nboolean"}, {"code": "-- Roblox-specific (won't run in plain Luau)\nlocal pos = Vector3.new(1, 2, 3)\nprint(typeof(pos))", "out": "Vector3"}], "why": "Useful when a function accepts more than one kind of input and you need to branch on the type. Also useful for debugging the question 'why is this nil?'", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local data = {1, 2, 3}\nprint(type(data))", "answer": ["table"], "explain": "Tables report as 'table'."}, {"type": "predict", "prompt": "What prints?", "code": "print(type(nil))", "answer": ["nil"], "explain": "nil's type is the string 'nil'."}], "recap": "type for basic Luau types. typeof for Roblox-aware types."}, {"id": "l60", "number": 60, "title": "Your First Type Annotations", "teaches": "Optional type hints.", "idea": "Luau is gradually typed. You can add type hints using a colon: `local coins: number = 25`. Function parameters and returns can be annotated too.", "examples": [{"code": "local coins: number = 25\nlocal playerName: string = \"Alex\"\nlocal isReady: boolean = true\n\nprint(coins)\nprint(playerName)\nprint(isReady)", "out": "25\nAlex\ntrue"}, {"code": "local function add(a: number, b: number): number\n    return a + b\nend\n\nprint(add(3, 4))", "out": "7"}], "why": "Annotations don't change how the code runs. They give Roblox Studio enough information to underline bugs as you type them, which catches mistakes earlier.", "note": "Annotations are optional. Code without them still works. Once you start typing things, the editor experience gets much better — autocomplete is sharper, errors are clearer, refactoring is safer.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function double(value: number): number\n    return value * 2\nend\n\nprint(double(6))", "answer": ["12"], "explain": "Types don't change runtime behavior."}, {"type": "choice", "prompt": "What symbol separates a variable from its type?", "choices": [".", ":", "=", "->"], "answer": 1, "explain": "Colon. `local x: number = 5`."}], "recap": "Optional type hints. `name: type` for variables, `param: type` for parameters, `): type` for return."}], "review": {"title": "Module 4 Checkpoint", "blurb": "These tools show up in every project. If any question stops you cold, revisit that lesson.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local owned = {Sword = true, Bow = false}\nprint(owned.Sword, owned.Bow, owned.Axe)", "answer": ["true false nil"], "explain": "Sword=true, Bow=false, Axe missing = nil. (Lesson 46)"}, {"type": "predict", "prompt": "What prints?", "code": "local name = nil\nprint(name or \"Guest\")", "answer": ["Guest"], "explain": "nil is falsy. or returns the right side. (Lesson 47)"}, {"type": "predict", "prompt": "What prints?", "code": "local list = {3, 1, 4, 1, 5}\ntable.sort(list)\nprint(list[1], list[5])", "answer": ["1 5"], "explain": "Ascending sort. (Lesson 50)"}, {"type": "predict", "prompt": "What prints?", "code": "print(string.format(\"%s scored %d\", \"Lia\", 95))", "answer": ["Lia scored 95"], "explain": "%s → string, %d → integer. (Lesson 52)"}, {"type": "predict", "prompt": "What prints?", "code": "local function counter()\n    local c = 0\n    return function() c = c + 1; return c end\nend\nlocal c = counter()\nprint(c(), c(), c())", "answer": ["1 2 3"], "explain": "Closure with its own c. (Lesson 56)"}, {"type": "predict", "prompt": "What's the first value pcall returns when the inner function errors?", "code": "local s, e = pcall(function() error(\"boom\") end)\nprint(s)", "answer": ["false"], "explain": "Error → success = false. (Lesson 58)"}, {"type": "choice", "prompt": "Which is the correct syntax for typing a parameter as a number?", "choices": ["function f(x = number)", "function f(x: number)", "function f(number x)", "function f(<number> x)"], "answer": 1, "explain": "Colon then type. (Lesson 60)"}]}}, {"id": "m5", "number": 5, "title": "Advanced Luau", "subtitle": "Lessons 61-75 · Power Tools", "hours": 20, "intro": "Modules 1 through 4 covered the basics. This one covers the heavier tools: pattern matching, recursion, callbacks, the variadic and type systems, coroutines, metatables, and OOP. You'll see these everywhere in Roblox codebases.", "lessons": [{"id": "l61", "number": 61, "title": "Pattern Matching with string.match", "teaches": "Searching with patterns instead of literal text.", "idea": "Lua patterns describe what a piece of text should look like. `string.match(text, pattern)` returns the first part of text that fits the pattern, or nil if nothing fits.", "examples": [{"code": "local text = \"Lua is fun\"\nlocal word = string.match(text, \"%a+\")\nprint(word)", "out": "Lua"}, {"code": "local date = \"2025-02-27\"\nlocal year, month, day = string.match(date, \"(%d+)-(%d+)-(%d+)\")\nprint(year, month, day)", "out": "2025 02 27"}], "why": "When text doesn't arrive clean (pulling numbers out of a sentence, picking the year out of a date, checking that a string looks like an email), patterns do the work in one line.", "patterns": ["`%a` matches any letter, `%a+` matches one or more letters", "`%d` matches any digit, `%d+` matches one or more digits", "`%s` matches any whitespace", "`%w` matches any letter or digit", "`.` matches any single character", "`+` means 'one or more', `*` means 'zero or more', `?` means 'optional'", "Parentheses `( )` create capture groups, returned as the matched values"], "questions": [{"type": "predict", "prompt": "What prints?", "code": "print(string.match(\"Hello 42!\", \"%d+\"))", "answer": ["42"], "explain": "%d+ matches one or more digits. The 42 in the string is matched."}, {"type": "predict", "prompt": "What prints?", "code": "print(string.match(\"abc123\", \"%a+\"))", "answer": ["abc"], "explain": "%a+ matches one or more letters. The longest run is 'abc' before the digits start."}], "recap": "string.match finds a shape in text. %a letters, %d digits, %s whitespace, %w word chars, + one or more, parens capture."}, {"id": "l62", "number": 62, "title": "string.gmatch — Iterate Over All Matches", "teaches": "Looping through every match in a string.", "idea": "`string.gmatch(text, pattern)` returns an iterator. Used in `for ... in`, it yields every match in order.", "examples": [{"code": "local s = \"one, two, three\"\nfor word in string.gmatch(s, \"%a+\") do\n    print(word)\nend", "out": "one\ntwo\nthree"}, {"code": "local csv = \"apple,banana,cherry\"\nfor item in string.gmatch(csv, \"[^,]+\") do\n    print(item)\nend", "out": "apple\nbanana\ncherry"}], "why": "Parsing CSV, reading every word in a sentence, finding every number in a log line.", "note": "`[^,]+` means 'one or more characters that are not a comma'. Inside square brackets, `^` means 'not'.", "questions": [{"type": "predict", "prompt": "How many lines does this print?", "code": "for w in string.gmatch(\"a b c d\", \"%a+\") do\n    print(w)\nend", "answer": ["4"], "explain": "Four words: a, b, c, d. Each on its own line."}], "recap": "gmatch yields each match in turn. Loop with `for x in string.gmatch(...)`."}, {"id": "l63", "number": 63, "title": "string.gsub — Find and Replace", "teaches": "Replacing matches with new text.", "idea": "`string.gsub(text, pattern, replacement)` returns a new string where each match of pattern is replaced by replacement. It also returns the number of replacements made.", "examples": [{"code": "local result = string.gsub(\"Hello, Lua!\", \"Lua\", \"World\")\nprint(result)", "out": "Hello, World!"}, {"code": "local cleaned = string.gsub(\"a1b2c3\", \"%d\", \"\")\nprint(cleaned)", "out": "abc"}], "why": "Find and replace. Censoring words, removing characters, substituting tokens in a template.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "print(string.gsub(\"aaa bbb aaa\", \"aaa\", \"X\"))", "answer": ["X bbb X 2", "X bbb X    2"], "explain": "gsub returns two values: the new string and the count of replacements. Two replacements happened."}], "recap": "gsub finds and replaces. Returns the new string and how many replacements happened."}, {"id": "l64", "number": 64, "title": "Recursion", "teaches": "A function that calls itself.", "idea": "A recursive function calls itself, usually with a smaller version of the problem. Every recursive function needs a base case, a condition that stops the recursion.", "examples": [{"code": "local function countdown(n)\n    if n <= 0 then\n        return\n    end\n    print(n)\n    countdown(n - 1)\nend\n\ncountdown(3)", "out": "3\n2\n1"}, {"code": "local function factorial(n)\n    if n <= 1 then\n        return 1\n    end\n    return n * factorial(n - 1)\nend\n\nprint(factorial(5))", "out": "120"}], "why": "Some problems are easier to express as 'do something with the first piece, then call yourself on the rest'. Walking a folder tree, deep-cloning nested data, mathematical sequences.", "note": "Skip the base case and the function calls itself forever. The script crashes with 'stack overflow'. Write the base case first.", "questions": [{"type": "predict", "prompt": "What does factorial(4) return?", "code": "factorial(4)  -- where factorial multiplies n * factorial(n-1) until n <= 1", "answer": ["24"], "explain": "4 * 3 * 2 * 1 = 24."}, {"type": "choice", "prompt": "What happens without a base case?", "choices": ["Function returns nil", "Loop ends", "Stack overflow / crash", "Nothing"], "answer": 2, "explain": "No stopping condition, so recursion goes forever and runs out of stack space."}], "recap": "Recursive: calls itself. Always have a base case."}, {"id": "l65", "number": 65, "title": "table.create, table.clear, table.move", "teaches": "Three more table helpers.", "idea": "`table.create(n, v)` makes a new table of n copies of v. `table.clear(t)` empties a table in place. `table.move(src, startIndex, endIndex, destStart, dest)` copies a range from src into dest.", "examples": [{"code": "-- Create a table of 5 zeros\nlocal grid = table.create(5, 0)\nprint(grid[1], grid[5])", "out": "0 0"}, {"code": "local t = {1, 2, 3}\ntable.clear(t)\nprint(#t)", "out": "0"}, {"code": "local src = {10, 20, 30, 40, 50}\nlocal dst = {}\ntable.move(src, 2, 4, 1, dst)\nprint(dst[1], dst[2], dst[3])", "out": "20 30 40"}], "why": "Faster than hand-rolled equivalents when working with a lot of items. table.create pre-sizes, table.clear avoids allocating a new table, table.move shifts ranges efficiently.", "note": "table.move(src, startIndex, endIndex, destStart, dest) copies src[startIndex..endIndex] into dest starting at destStart.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local row = table.create(3, \"x\")\nprint(row[1], row[2], row[3])", "answer": ["x x x"], "explain": "table.create(n, v) makes a table of n copies of v."}], "recap": "create pre-sizes. clear empties in place. move copies ranges."}, {"id": "l66", "number": 66, "title": "Anonymous Functions and Callbacks", "teaches": "Functions as arguments to other functions.", "idea": "A callback is a function you hand to another function. The other function decides when to run it. Anonymous functions (functions written inline with no name) are the usual way to write them.", "examples": [{"code": "-- Filter a list using a callback\nlocal function filter(list, keepFn)\n    local result = {}\n    for _, v in ipairs(list) do\n        if keepFn(v) then\n            table.insert(result, v)\n        end\n    end\n    return result\nend\n\nlocal nums = {1, 2, 3, 4, 5}\nlocal evens = filter(nums, function(n) return n % 2 == 0 end)\nprint(evens[1], evens[2])", "out": "2 4"}], "why": "Click handlers, sort comparators, event listeners, filtering and mapping over lists, async completions. Passing functions around is half the Roblox API.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function apply(value, fn)\n    return fn(value)\nend\nprint(apply(5, function(x) return x * x end))", "answer": ["25"], "explain": "apply calls the callback with value 5. The callback returns 5 * 5 = 25."}], "recap": "Callbacks: functions passed as arguments. Often written as anonymous functions."}, {"id": "l67", "number": 67, "title": "Variadic Functions (...)", "teaches": "Functions that accept any number of arguments.", "idea": "`...` in a parameter list means 'any number of additional arguments'. Inside the function, `...` is the captured list. `{...}` packs them into a regular table.", "examples": [{"code": "local function printAll(...)\n    local args = {...}\n    for i, v in ipairs(args) do\n        print(i, v)\n    end\nend\n\nprintAll(\"a\", \"b\", \"c\")", "out": "1 a\n2 b\n3 c"}, {"code": "local function sum(...)\n    local total = 0\n    for _, n in ipairs({...}) do\n        total = total + n\n    end\n    return total\nend\n\nprint(sum(1, 2, 3, 4))", "out": "10"}], "why": "Useful when a function naturally takes a variable number of arguments. `print()` itself does.", "note": "`{...}` collects the varargs into a regular table you can loop over with ipairs.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local function countArgs(...)\n    return select(\"#\", ...)\nend\nprint(countArgs(\"a\", \"b\", \"c\", \"d\"))", "answer": ["4"], "explain": "select('#', ...) returns the number of variadic arguments."}], "recap": "`...` accepts any number of arguments. `{...}` makes them a table."}, {"id": "l68", "number": 68, "title": "Optional Types and the ? Suffix", "teaches": "Marking a type as 'this or nil'.", "idea": "Add `?` after a type to say 'this type, or nil'. Use it for parameters and fields that might be missing.", "examples": [{"code": "local function greet(name: string?)\n    if name then\n        print(\"Hello \" .. name)\n    else\n        print(\"Hello stranger\")\n    end\nend\n\ngreet(\"Alex\")\ngreet(nil)", "out": "Hello Alex\nHello stranger"}], "why": "Marks a value as possibly missing so the type checker reminds you to check before using it.", "note": "`string?` is shorthand for `string | nil`. Both work.", "questions": [{"type": "choice", "prompt": "Which type annotation says 'a number, or nil'?", "choices": ["number!", "number?", "number*", "?number"], "answer": 1, "explain": "Add ? after the type. number? = number or nil."}], "recap": "type? means 'that type or nil'."}, {"id": "l69", "number": 69, "title": "Union Types and the | Operator", "teaches": "A value that could be one of several types.", "idea": "`A | B` means 'A or B'. A union type accepts any of the listed types.", "examples": [{"code": "local function describe(value: string | number)\n    if type(value) == \"string\" then\n        print(\"text: \" .. value)\n    else\n        print(\"number: \" .. value)\n    end\nend\n\ndescribe(\"hello\")\ndescribe(42)", "out": "text: hello\nnumber: 42"}], "why": "Some functions take either an ID or the full object. Some accept either a string or a number. Union types describe that.", "questions": [{"type": "choice", "prompt": "Which type says 'string or boolean'?", "choices": ["string + boolean", "string | boolean", "string & boolean", "string, boolean"], "answer": 1, "explain": "Pipe `|` means union."}], "recap": "type1 | type2 for either-or. Add | nil for optional."}, {"id": "l70", "number": 70, "title": "Table Types and Type Aliases", "teaches": "Naming your own types.", "idea": "`type Name = ...` gives a name to a complex type. Table types use `{field: type, ...}`. Array types use `{type}`.", "examples": [{"code": "type Player = {\n    Name: string,\n    Coins: number,\n    IsVIP: boolean,\n}\n\nlocal alex: Player = {\n    Name = \"Alex\",\n    Coins = 50,\n    IsVIP = false,\n}\n\nprint(alex.Name, alex.Coins)", "out": "Alex 50"}, {"code": "type Inventory = { string }  -- list of strings\n\nlocal bag: Inventory = {\"Sword\", \"Shield\"}\nprint(bag[1])", "out": "Sword"}], "why": "Once a few fields cluster together (Name, Coins, Level), name the shape. Then function signatures become `(p: Player)` instead of `(p: {Name: string, Coins: number, Level: number})`.", "note": "`{ Field: Type, ... }` describes a table with named fields. `{ Type }` describes a list of values of that type.", "questions": [{"type": "choice", "prompt": "Which line declares a type alias?", "choices": ["local type Player = {Name: string}", "type Player = {Name: string}", "Player: type = {Name: string}", "alias Player {Name: string}"], "answer": 1, "explain": "The keyword is just `type`. No `local` needed."}], "recap": "type Name = ... to name a type. Table types: {field: T, ...}. Arrays: {T}."}, {"id": "l71", "number": 71, "title": "Coroutines — Pausing and Resuming", "teaches": "Threads of execution you can suspend and continue.", "idea": "A coroutine is a function whose execution can pause (with `coroutine.yield`) and resume later (with `coroutine.resume`).", "examples": [{"code": "local co = coroutine.create(function()\n    print(\"a\")\n    coroutine.yield()\n    print(\"b\")\nend)\n\ncoroutine.resume(co)  -- runs until yield\nprint(\"middle\")\ncoroutine.resume(co)  -- resumes after yield", "out": "a\nmiddle\nb"}], "why": "You rarely write raw coroutines in modern Roblox code. But the task library, RemoteFunction:InvokeServer, and every yielding API are built on coroutines. Knowing they exist helps you understand how scripts can wait without freezing the game.", "note": "Day to day, use task.wait and friends (Module 6) instead of raw coroutine.yield. Under the hood it's all the same machinery.", "questions": [{"type": "choice", "prompt": "What does coroutine.yield do?", "choices": ["Ends the coroutine", "Pauses it until resumed", "Restarts it", "Creates a new one"], "answer": 1, "explain": "yield pauses. The next resume picks up where yield was."}], "recap": "Coroutine = pausable function. yield to pause, resume to continue."}, {"id": "l72", "number": 72, "title": "Metatables — The Magic Behind Tables", "teaches": "Adding custom behavior to tables.", "idea": "A metatable is a side-table that gives another table extra behaviors. The most important behavior is `__index`: when you read a key that doesn't exist on the main table, Luau looks in the __index of the metatable.", "examples": [{"code": "local defaults = {HP = 100, Speed = 16}\n\nlocal player = setmetatable({Name = \"Alex\"}, {__index = defaults})\n\nprint(player.Name)  -- found directly\nprint(player.HP)    -- not in player, fallback to defaults", "out": "Alex\n100"}], "why": "Metatables are how Luau supports default values, custom operators, and object-oriented patterns. The standard OOP convention is built on __index.", "note": "`setmetatable(t, mt)` gives table `t` the metatable `mt`. The most-used metamethod by far is `__index`.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "local defaults = {Color = \"blue\"}\nlocal item = setmetatable({Name = \"Hat\"}, {__index = defaults})\nprint(item.Color)", "answer": ["blue"], "explain": "item has no Color, so the lookup falls through to defaults, which has Color = 'blue'."}], "recap": "Metatables add behavior. __index provides fallback lookups. setmetatable attaches the metatable."}, {"id": "l73", "number": 73, "title": "Object-Oriented Programming with Metatables", "teaches": "Building classes the Luau way.", "idea": "Standard Luau OOP shape: a table that acts as the class. Set `Class.__index = Class`. A `Class.new` constructor that makes a new table and gives it Class as its metatable. Instances then find shared methods on Class through __index.", "examples": [{"code": "-- Class definition\nlocal Animal = {}\nAnimal.__index = Animal\n\nfunction Animal.new(name, sound)\n    local self = setmetatable({}, Animal)\n    self.Name = name\n    self.Sound = sound\n    return self\nend\n\nfunction Animal:Speak()\n    print(self.Name .. \" says \" .. self.Sound)\nend\n\n-- Using it\nlocal dog = Animal.new(\"Rex\", \"Woof\")\nlocal cat = Animal.new(\"Mia\", \"Meow\")\n\ndog:Speak()\ncat:Speak()", "out": "Rex says Woof\nMia says Meow"}], "why": "Open-source Roblox codebases use this pattern constantly. Recognizing it on sight is half of being able to read other people's code.", "anatomy": ["`local Class = {}` — the class itself (a table of methods)", "`Class.__index = Class` — instances look up missing keys on the class", "`Class.new(...)` — constructor, makes a table with Class as its metatable", "`Class:Method()` — methods take self automatically"], "questions": [{"type": "choice", "prompt": "Why do we write `Class.__index = Class`?", "choices": ["To clone the class", "So instances find methods on the class", "To make it run faster", "To prevent errors"], "answer": 1, "explain": "Without __index = Class, instances wouldn't find methods stored on Class."}], "recap": "Class, Class.__index = Class, Class.new uses setmetatable. Call methods with :."}, {"id": "l74", "number": 74, "title": "Inheritance with Metatables", "teaches": "One class extending another.", "idea": "Set the subclass's metatable to the parent class. The lookup chain becomes: instance → subclass → parent. Anything missing on the subclass falls through to the parent.", "examples": [{"code": "-- Base class\nlocal Animal = {}\nAnimal.__index = Animal\n\nfunction Animal.new(name)\n    local self = setmetatable({}, Animal)\n    self.Name = name\n    return self\nend\n\nfunction Animal:Describe()\n    print(\"I am \" .. self.Name)\nend\n\n-- Subclass\nlocal Dog = setmetatable({}, {__index = Animal})\nDog.__index = Dog\n\nfunction Dog.new(name, breed)\n    local self = Animal.new(name)  -- call base constructor\n    setmetatable(self, Dog)        -- but instance metatable is Dog\n    self.Breed = breed\n    return self\nend\n\nfunction Dog:Bark()\n    print(self.Name .. \": Woof!\")\nend\n\nlocal rex = Dog.new(\"Rex\", \"Lab\")\nrex:Describe()  -- inherited from Animal\nrex:Bark()      -- defined on Dog", "out": "I am Rex\nRex: Woof!"}], "why": "One way to share behavior. In practice, composition (objects that hold other objects) is often cleaner than deep inheritance, but you'll see inheritance in plenty of existing code.", "questions": [{"type": "choice", "prompt": "What is the role of `setmetatable({}, {__index = Animal})` on the Dog class itself?", "choices": ["Sets Dog's metatable so missing methods fall through to Animal", "Creates a new Animal", "Deletes Animal", "Renames the class"], "answer": 0, "explain": "Two-level lookup: instance → Dog → Animal."}], "recap": "Subclass's metatable points at the parent. Methods resolve up the chain."}, {"id": "l75", "number": 75, "title": "Mini-Project — A Typed Inventory Module", "teaches": "Putting Module 5 ideas to work in one piece of code.", "idea": "A small inventory module that uses everything from Module 5: type annotations, methods, default values with or, lookup-table storage for counts, and the standard module shape.", "examples": [{"code": "-- ModuleScript: Inventory\nlocal Inventory = {}\nInventory.__index = Inventory\n\ntype InventoryData = {\n    Items: { [string]: number },  -- itemName -> count\n}\n\nfunction Inventory.new(): typeof(setmetatable({} :: InventoryData, Inventory))\n    local self = setmetatable({}, Inventory)\n    self.Items = {}\n    return self\nend\n\nfunction Inventory:Add(itemName: string, count: number?)\n    count = count or 1\n    self.Items[itemName] = (self.Items[itemName] or 0) + count\nend\n\nfunction Inventory:Remove(itemName: string, count: number?): boolean\n    count = count or 1\n    local current = self.Items[itemName] or 0\n    if current < count then\n        return false\n    end\n    self.Items[itemName] = current - count\n    if self.Items[itemName] == 0 then\n        self.Items[itemName] = nil\n    end\n    return true\nend\n\nfunction Inventory:CountOf(itemName: string): number\n    return self.Items[itemName] or 0\nend\n\nreturn Inventory", "out": "(module defined)"}, {"code": "local Inventory = require(script.Parent.Inventory)\n\nlocal bag = Inventory.new()\nbag:Add(\"Coin\", 10)\nbag:Add(\"Coin\", 5)\nbag:Add(\"Sword\")\n\nprint(bag:CountOf(\"Coin\"))   -- 15\nprint(bag:CountOf(\"Sword\"))  -- 1\nprint(bag:CountOf(\"Shield\")) -- 0", "out": "15\n1\n0"}], "why": "This is roughly the shape of a small, self-contained module in a real game. Read it, predict the behavior of each piece, then try writing your own version for something different (an equipment slot manager, a tag set, a cooldown tracker).", "questions": [{"type": "predict", "prompt": "What prints?", "code": "-- given the Inventory module above\nlocal bag = Inventory.new()\nbag:Add(\"Apple\", 3)\nbag:Remove(\"Apple\", 2)\nprint(bag:CountOf(\"Apple\"))", "answer": ["1"], "explain": "Add 3, remove 2, leaves 1."}], "recap": "Module 5 done. The Luau language is mostly behind you. The Roblox engine is next."}], "review": {"title": "Module 5 Checkpoint", "blurb": "Heavier ideas in this module. If any of these are shaky, revisit before moving to Roblox-specific scripting. Module 6 builds on metatables, types, and callbacks.", "questions": [{"type": "predict", "prompt": "What prints?", "code": "print(string.match(\"Order #1234\", \"%d+\"))", "answer": ["1234"], "explain": "%d+ matches the digits. (Lesson 61)"}, {"type": "predict", "prompt": "What prints? Total count of words.", "code": "local n = 0\nfor _ in string.gmatch(\"the quick brown fox\", \"%a+\") do\n    n = n + 1\nend\nprint(n)", "answer": ["4"], "explain": "4 words. (Lesson 62)"}, {"type": "choice", "prompt": "A recursive function MUST have:", "choices": ["A loop", "A base case", "A return value", "A parameter"], "answer": 1, "explain": "Without a base case, the recursion never stops. (Lesson 64)"}, {"type": "choice", "prompt": "Which is the correct way to write 'string or nil' in a type?", "choices": ["string!", "string?", "?string", "string*"], "answer": 1, "explain": "Suffix ?. Same as string | nil. (Lesson 68-69)"}, {"type": "choice", "prompt": "In the OOP pattern, why set Class.__index = Class?", "choices": ["For speed", "So instances can find methods on Class", "Required by Luau", "To prevent errors"], "answer": 1, "explain": "Instance lookups for methods fall through to Class. (Lesson 73)"}, {"type": "predict", "prompt": "What prints?", "code": "local function rest(first, ...) return first, ... end\nlocal a, b, c = rest(\"x\", \"y\", \"z\")\nprint(a, b, c)", "answer": ["x y z"], "explain": "Variadic ... captures and forwards. (Lesson 67)"}]}}, {"id": "m6", "number": 6, "title": "Roblox Scripting Essentials", "subtitle": "Lessons 76-90 · From Luau to Roblox", "hours": 24, "intro": "Luau is the language. Roblox is the engine that runs it, with services, instances, events, players, and a network split between server and client. This module covers what you need to write actual Roblox scripts. Every detail comes from official Roblox documentation or the developer forum.", "lessons": [{"id": "l76", "number": 76, "title": "Server vs Client", "teaches": "The core split that defines all Roblox scripting.", "idea": "A Roblox game runs in two places at once. The **server** runs on Roblox's computers and holds the truth about everything in the game. Each **client** runs on a player's device and shows them their view. A `Script` runs on the server. A `LocalScript` runs on a client.", "examples": [{"code": "-- A Script (server-side) typically goes in ServerScriptService\nprint(\"This runs on the server\")\n-- Has access to: ServerScriptService, ServerStorage, all players\n-- Can: change the game world, trust no one but itself", "out": "(server output)"}, {"code": "-- A LocalScript runs on a player's device\n-- Typical locations: StarterPlayerScripts, StarterCharacterScripts, StarterGui\nprint(\"This runs on the client\")\n-- Has access to: the local player, their camera, their UI\n-- Cannot: see other players' data securely, change global game state alone", "out": "(client output)"}], "why": "Most Roblox bugs, security holes, and 'why isn't this working' confusions come from mixing up server and client. Getting this distinction right makes the rest of the module make sense.", "patterns": ["Server has authority. Coin counts, inventories, damage. All server-side.", "Client handles input and display. Button clicks, animations, custom GUIs. All client-side.", "Server and client talk through Remotes (next lessons)."], "questions": [{"type": "choice", "prompt": "Where does a regular `Script` run?", "choices": ["On every player's device", "On the server", "Both at once", "It depends"], "answer": 1, "explain": "Script = server-only. For client code, use LocalScript."}, {"type": "choice", "prompt": "Where should sensitive data like a player's coin count live?", "choices": ["On the client", "On the server", "In both places equally", "Wherever convenient"], "answer": 1, "explain": "The server is the authority. Trusting the client invites cheating."}], "recap": "Script = server. LocalScript = client. Server is the source of truth. Never trust the client."}, {"id": "l77", "number": 77, "title": "Services and game:GetService", "teaches": "How to access Roblox's built-in services.", "idea": "Roblox provides services: singletons that handle specific responsibilities. Call `game:GetService(\"ServiceName\")` to get one. It accesses services by ClassName, which is more reliable than `game.ServiceName` because Names can change.", "examples": [{"code": "local Players = game:GetService(\"Players\")\nlocal ReplicatedStorage = game:GetService(\"ReplicatedStorage\")\nlocal RunService = game:GetService(\"RunService\")\nlocal TweenService = game:GetService(\"TweenService\")\n\nprint(Players)\nprint(ReplicatedStorage)", "out": "Players\nReplicatedStorage"}], "why": "Services are how you reach Roblox features: managing players, storing shared assets, running per-frame code, tweening properties, handling input. Almost every script starts with a few GetService calls at the top.", "note": "From the Roblox developer forum (devforum.roblox.com/t/gameservice-versus-gamegetserviceservice/2024387): `game:GetService` accesses through ClassName, while `game.ServiceName` accesses through Name. GetService is more reliable because Names can be changed, and some services (like RunService, which is actually named 'Run Service' with a space) are awkward to access by Name. GetService also creates the service if it doesn't already exist.", "ref": "Services you'll use constantly: Players, ReplicatedStorage, ServerScriptService, ServerStorage, StarterPlayer, StarterGui, RunService, TweenService, UserInputService, DataStoreService, HttpService.", "questions": [{"type": "choice", "prompt": "Which is the recommended way to access ReplicatedStorage?", "choices": ["game.ReplicatedStorage", "game:GetService(\"ReplicatedStorage\")", "ReplicatedStorage", "_G.ReplicatedStorage"], "answer": 1, "explain": "GetService is reliable. It works even if the service Name was changed and creates the service if needed."}, {"type": "choice", "prompt": "What does game:GetService do that game.ServiceName cannot?", "choices": ["Runs faster", "Accesses by ClassName so Name changes don't break it", "Bypasses security", "Makes the service global"], "answer": 1, "explain": "GetService uses ClassName lookup, robust against Name changes."}], "recap": "Use `game:GetService(\"...\")` to get services. Standard, reliable."}, {"id": "l78", "number": 78, "title": "Workspace, ReplicatedStorage, ServerScriptService, StarterPlayer", "teaches": "Where things live in a Roblox place.", "idea": "Roblox places have specific containers for specific kinds of content. Each container has its own visibility and replication rules. Picking the right one matters.", "examples": [{"code": "-- Common containers:\n-- Workspace        Visible game world (parts, models, terrain). Replicated.\n-- ReplicatedStorage Shared assets and remotes. Visible to server AND client.\n-- ServerScriptService Server-only scripts. NOT visible to clients.\n-- ServerStorage    Server-only assets (templates, data). NOT visible to clients.\n-- StarterPlayer    What players get when they join.\n--   StarterPlayerScripts: LocalScripts that run when a player joins.\n--   StarterCharacterScripts: LocalScripts that run when a character spawns.\n-- StarterGui       UI templates copied into each player's PlayerGui.\n\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal SS = game:GetService(\"ServerScriptService\")\nlocal Workspace = game:GetService(\"Workspace\")\n\nprint(Workspace, RS, SS)", "out": "Workspace ReplicatedStorage ServerScriptService"}], "why": "Put a Script in ReplicatedStorage and clients can see its source, which is a security problem. Put a RemoteEvent in ServerStorage and clients can't find it, breaking communication. The containers are not interchangeable.", "habits": ["Server-only scripts → ServerScriptService", "Server-only assets (templates) → ServerStorage", "Shared assets and remotes → ReplicatedStorage", "Client scripts → StarterPlayerScripts (run on join) or StarterCharacterScripts (run on respawn)", "Modules shared by server and client → ReplicatedStorage (carefully)", "Server-only modules → ServerScriptService or ServerStorage"], "questions": [{"type": "choice", "prompt": "Where should a script that runs game logic on the server live?", "choices": ["ReplicatedStorage", "ServerScriptService", "Workspace", "StarterPlayer"], "answer": 1, "explain": "ServerScriptService is the standard place for server scripts. Clients cannot see anything in it."}, {"type": "choice", "prompt": "Where should a RemoteEvent live so both server and clients can find it?", "choices": ["Workspace", "ReplicatedStorage", "ServerStorage", "ServerScriptService"], "answer": 1, "explain": "ReplicatedStorage is shared. Clients can find the RemoteEvent there. ServerStorage is invisible to clients."}], "recap": "Each container has a purpose. Match the content to the container."}, {"id": "l79", "number": 79, "title": "Instances, Properties, Parent and Children", "teaches": "How the game tree is shaped.", "idea": "Almost everything in a Roblox place is an Instance: a Part, a Model, a Script, a Service. Instances form a tree. Each one has a Parent (the node above it) and possibly Children (the nodes below). Every instance has properties (Name, Position, Color, etc.) you can read or set.", "examples": [{"code": "-- Read a property\nlocal part = workspace.Baseplate\nprint(part.Name)\nprint(part.Position)\n\n-- Set a property\npart.BrickColor = BrickColor.new(\"Bright red\")\n\n-- Create a new instance\nlocal newPart = Instance.new(\"Part\")\nnewPart.Size = Vector3.new(4, 1, 4)\nnewPart.Parent = workspace", "out": "Baseplate\n0, 0, 0"}], "why": "Instances are the game. Player avatars are models with parts. UI is a tree of frames. Setting `newPart.Parent = workspace` is literally what makes the part appear in the world.", "note": "Setting `Parent` last is a common pattern. The instance only becomes visible once it has a Parent, so set the other properties first, then set the Parent. The world sees a finished part instead of one that flickers into shape.", "questions": [{"type": "choice", "prompt": "What property must you set to make a new instance appear in the game?", "choices": ["Visible", "Name", "Parent", "Position"], "answer": 2, "explain": "An instance with no Parent is detached. Setting Parent puts it into the tree."}, {"type": "predict", "prompt": "After this code, where is newPart visible?", "code": "local newPart = Instance.new(\"Part\")\nnewPart.Parent = workspace.SpawnLocation\nprint(newPart.Parent.Name)", "answer": ["SpawnLocation"], "explain": "newPart was parented to SpawnLocation, so its Parent is SpawnLocation. newPart.Parent.Name reads back the Parent's Name property."}], "recap": "Instances are the building blocks. They have properties, and they live in a tree connected by Parent/Children."}, {"id": "l80", "number": 80, "title": ":WaitForChild and :FindFirstChild", "teaches": "Safe ways to access children that may not exist yet.", "idea": "`parent:WaitForChild(\"Name\")` yields the script until a child with that Name exists. `parent:FindFirstChild(\"Name\")` returns the child if it exists, or nil. Use WaitForChild when you need the child and can wait. Use FindFirstChild when you just want to check.", "examples": [{"code": "local RS = game:GetService(\"ReplicatedStorage\")\n\n-- Wait for the remote to exist (good for client code that runs early)\nlocal myRemote = RS:WaitForChild(\"MyRemote\")\n\n-- Check optionally\nlocal maybeData = RS:FindFirstChild(\"OptionalData\")\nif maybeData then\n    print(\"Got the data\")\nelse\n    print(\"No data\")\nend", "out": "(depends on scene)"}], "why": "Clients often start before the server finishes setting things up. Accessing `RS.MyRemote` directly might error because MyRemote isn't there yet. WaitForChild handles that timing gracefully.", "note": "WaitForChild yields. Don't put it inside performance-sensitive code. Call it at the top of a script to grab the references, then reuse them.", "questions": [{"type": "choice", "prompt": "If the child might not exist yet but will soon, which do you use?", "choices": ["parent.Name", "parent:FindFirstChild", "parent:WaitForChild", "Instance.new"], "answer": 2, "explain": "WaitForChild yields until the child appears. Direct access would error."}, {"type": "choice", "prompt": "If the child might never exist and you just want to check, which do you use?", "choices": ["parent.Name", "parent:FindFirstChild", "parent:WaitForChild", "parent:GetChildren"], "answer": 1, "explain": "FindFirstChild returns nil if absent. WaitForChild would yield forever."}], "recap": "WaitForChild yields until the child appears. FindFirstChild returns nil if absent."}, {"id": "l81", "number": 81, "title": "Events with :Connect", "teaches": "Reacting to things that happen.", "idea": "Many Roblox objects fire events when something happens. You connect a function to an event using `event:Connect(handler)`. When the event fires, your function runs with whatever arguments the event provides.", "examples": [{"code": "local part = workspace.Baseplate\n\npart.Touched:Connect(function(hit)\n    print(hit.Name .. \" touched the baseplate\")\nend)", "out": "(triggers on touch)"}, {"code": "local Players = game:GetService(\"Players\")\n\nPlayers.PlayerAdded:Connect(function(player)\n    print(player.Name .. \" joined\")\nend)", "out": "(triggers when a player joins)"}], "why": "Games are reactive. Players join, parts collide, properties change, inputs happen. Connecting to events is how your script responds. Most of your Roblox code lives inside event handlers.", "note": "Connect returns a Connection object. Call `:Disconnect()` on it later to stop listening. Forgetting to disconnect causes memory leaks in long-running games.", "questions": [{"type": "choice", "prompt": "Which method connects a function to an event?", "choices": [":Listen", ":On", ":Connect", ":Bind"], "answer": 2, "explain": "Roblox uses :Connect."}, {"type": "choice", "prompt": "When a player joins the game, which event fires?", "choices": ["Players.PlayerAdded", "Players.OnJoin", "game.PlayerEntered", "Player.New"], "answer": 0, "explain": "Players.PlayerAdded fires for every joining player. The Player object is passed as the argument."}], "recap": "event:Connect(function(args) ... end) reacts to events. The Connection object's :Disconnect() stops listening."}, {"id": "l82", "number": 82, "title": "PlayerAdded and CharacterAdded", "teaches": "The two events that anchor most player-related code.", "idea": "`Players.PlayerAdded` fires when a player joins. `player.CharacterAdded` fires every time their character spawns or respawns. These two events anchor most per-player setup.", "examples": [{"code": "local Players = game:GetService(\"Players\")\n\nPlayers.PlayerAdded:Connect(function(player)\n    print(player.Name .. \" joined\")\n\n    player.CharacterAdded:Connect(function(character)\n        print(player.Name .. \" spawned\")\n    end)\nend)", "out": "(triggers as players join and spawn)"}], "why": "Almost every per-player task starts here: give starting items, load save data, attach a leaderstats folder, listen for damage when their character spawns. CharacterAdded re-fires every respawn, which matters because the character is a fresh model each time.", "note": "Common pitfall: a player can join before your script connects to PlayerAdded, especially in Studio. Loop the existing players too and call your handler manually for them.", "questions": [{"type": "choice", "prompt": "How often does CharacterAdded fire for a single player?", "choices": ["Once when they join", "Every time their character spawns or respawns", "Once per session", "Never automatically"], "answer": 1, "explain": "Every spawn or respawn. The Character object is a fresh model each time."}], "recap": "PlayerAdded for joining. CharacterAdded for spawning. Both in a Script inside ServerScriptService."}, {"id": "l83", "number": 83, "title": "The task Library (replaces wait)", "teaches": "How to pause execution properly.", "idea": "Modern Roblox code uses the `task` library for timing. `task.wait(seconds)` pauses the current code for at least that many seconds, then resumes. `task.spawn(fn)` runs a function in its own thread. `task.delay(seconds, fn)` runs a function after a delay.", "examples": [{"code": "print(\"Start\")\ntask.wait(2)\nprint(\"Two seconds later\")", "out": "Start\n(2-second pause)\nTwo seconds later"}, {"code": "task.spawn(function()\n    task.wait(1)\n    print(\"In another thread\")\nend)\nprint(\"This prints first\")", "out": "This prints first\nIn another thread"}], "why": "Every 'do something after a delay' pattern uses task.wait or task.delay. Every 'do this in parallel without blocking' uses task.spawn. The task library shows up constantly.", "note": "The older `wait()` function (without `task.`) still exists but is essentially deprecated. From the Roblox dev forum: `task.wait` doesn't throttle, runs on the 60Hz Heartbeat, and is the recommended modern API. Prefer `task.wait` everywhere.", "ref": "Source: devforum.roblox.com/t/wait-vs-taskwait/2323092 — 'task.wait() is an improved version of wait() as it schedules the current thread to be resumed after some time has elapsed without throttling.'", "questions": [{"type": "choice", "prompt": "Which is the modern, preferred way to pause a script for 1 second?", "choices": ["sleep(1)", "wait(1)", "task.wait(1)", "pause(1)"], "answer": 2, "explain": "task.wait is the modern, non-throttling API."}, {"type": "choice", "prompt": "Which runs a function in its own thread without blocking the current code?", "choices": ["task.wait", "task.spawn", "task.delay", "task.run"], "answer": 1, "explain": "task.spawn starts a new thread immediately."}], "recap": "task.wait for delays, task.spawn for parallel work, task.delay for deferred runs. Avoid bare wait()."}, {"id": "l84", "number": 84, "title": "RemoteEvent — Client and Server Talking", "teaches": "Fire-and-forget messages between client and server.", "idea": "A RemoteEvent lets the client send a message to the server (`:FireServer`) or the server send a message to one or all clients (`:FireClient`, `:FireAllClients`). It doesn't return a value. The client listens with `OnClientEvent`. The server listens with `OnServerEvent`.", "examples": [{"code": "-- Server script: create the remote, listen for clicks\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal clickEvent = Instance.new(\"RemoteEvent\")\nclickEvent.Name = \"ClickEvent\"\nclickEvent.Parent = RS\n\nclickEvent.OnServerEvent:Connect(function(player)\n    print(player.Name .. \" clicked\")\nend)", "out": "(server output)"}, {"code": "-- LocalScript: fire when player presses a button\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal clickEvent = RS:WaitForChild(\"ClickEvent\")\n\n-- Imagine this in a button.MouseButton1Click handler\nclickEvent:FireServer()", "out": "(client output)"}], "why": "RemoteEvents are the standard way to bridge the client/server split. Click button, tell server. Server changes state, tell clients to update their UI.", "note": "From the Roblox dev forum tutorial on remotes: when the server fires a remote to a client, the OnClientEvent handler does NOT automatically receive the player. When the server receives a fire from a client (OnServerEvent), the FIRST argument is always the player. This catches many beginners. Clients can't lie about which player they are because Roblox sets that argument automatically.", "ref": "Source: devforum.roblox.com/t/a-better-way-to-understand-remote-events-and-remote-functions/614210", "questions": [{"type": "choice", "prompt": "When a client fires a RemoteEvent to the server, what is the first argument the server receives?", "choices": ["The data the client sent", "The player object (set automatically)", "The remote's Name", "Nothing extra"], "answer": 1, "explain": "Roblox always adds the player as the first argument to OnServerEvent. The client can't fake it."}, {"type": "choice", "prompt": "Which event do you connect to on the SERVER to receive a fire from a client?", "choices": ["OnClientEvent", "OnServerEvent", "OnFire", "Fired"], "answer": 1, "explain": "Server listens with OnServerEvent. Clients listen with OnClientEvent."}], "recap": "RemoteEvent: fire-and-forget. FireServer/FireClient. Server-side handler always gets player as first arg."}, {"id": "l85", "number": 85, "title": "RemoteFunction — Asking for a Value", "teaches": "Two-way communication that returns a value.", "idea": "A RemoteFunction works like a function call across the network. The client calls `remote:InvokeServer(args)` and waits until the server returns a value. The server defines `remote.OnServerInvoke = function(player, args) ... return value end`.", "examples": [{"code": "-- Server: set up the remote function\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal getRandom = Instance.new(\"RemoteFunction\")\ngetRandom.Name = \"GetRandom\"\ngetRandom.Parent = RS\n\ngetRandom.OnServerInvoke = function(player)\n    return math.random(1, 100)\nend", "out": "(server output)"}, {"code": "-- LocalScript: ask the server for a random number\nlocal RS = game:GetService(\"ReplicatedStorage\")\nlocal getRandom = RS:WaitForChild(\"GetRandom\")\n\nlocal number = getRandom:InvokeServer()\nprint(\"Server said:\", number)", "out": "Server said: <some number 1-100>"}], "why": "Use a RemoteFunction when the caller needs the answer before continuing. Example: client clicks 'Buy Item', server checks coins, server returns success or failure, client shows the result.", "note": "From the Roblox dev forum: 'Remote functions will do all the code before continuing the code on the script that triggers it.' That's the key difference. InvokeServer yields until the server returns. FireServer doesn't yield. Choose by whether you need the answer.", "questions": [{"type": "choice", "prompt": "When should you choose RemoteFunction over RemoteEvent?", "choices": ["Always", "Never", "When the caller needs to wait for a return value", "For speed"], "answer": 2, "explain": "RemoteFunction yields and returns a value. RemoteEvent doesn't. Pick by whether you need the answer."}, {"type": "choice", "prompt": "What property do you set on the server to handle a client's invoke?", "choices": ["OnServerEvent", "OnServerInvoke", "InvokeServer", "ServerHandler"], "answer": 1, "explain": "OnServerInvoke = function(player, ...). It's an assignment, not a connection."}], "recap": "RemoteFunction = network function call with a return value. Client InvokeServer, server OnServerInvoke."}, {"id": "l86", "number": 86, "title": "Security — Never Trust the Client", "teaches": "The rule that keeps your game from being cheated.", "idea": "The client runs on the player's machine. The player can modify it, send fake inputs, lie about their state, or use exploits. Anything the client sends to the server is suspect. Validate on the server.", "examples": [{"code": "-- BAD: trusts the client\ngiveItemEvent.OnServerEvent:Connect(function(player, itemName, count)\n    -- Whatever the client sent, we just give it.\n    -- An exploiter sends FireServer(\"BestSword\", 999) and gets 999 best swords.\n    player.Inventory[itemName] = count\nend)", "out": "(insecure)"}, {"code": "-- GOOD: validates on the server\nlocal SHOP_ITEMS = { Sword = 50, Shield = 30 }\n\nbuyEvent.OnServerEvent:Connect(function(player, itemName)\n    local price = SHOP_ITEMS[itemName]\n    if not price then return end             -- unknown item\n    if player.Coins.Value < price then return end -- can't afford\n\n    player.Coins.Value -= price\n    -- give item ...\nend)", "out": "(safe)"}], "why": "Trust the client and you lose. From the dev forum on remote security: 'The client can lie about any data it sends to the server and fire any remote at any time so you should always validate everything on the server.'", "ref": "Source: devforum.roblox.com/t/a-better-way-to-understand-remote-events-and-remote-functions/614210", "habits": ["Never let the client tell the server the cost of something.", "Never let the client tell the server how much damage to deal.", "Always re-check on the server: is the player in range? do they have the item? are they allowed?", "Name remotes for what the client is requesting, not what to do. 'BuyItem' is safer than 'GiveItem'. The latter assumes the client gets to dictate."], "questions": [{"type": "choice", "prompt": "Which of these is safest?", "choices": ["Server gives whatever item the client requests", "Server checks if the player can afford the item before giving", "Client subtracts coins and tells server", "Trust the local script"], "answer": 1, "explain": "Server-side validation. Always."}], "recap": "The client lies. Validate everything on the server. No exceptions."}, {"id": "l87", "number": 87, "title": "TweenService — Smooth Property Changes", "teaches": "Animating properties over time.", "idea": "TweenService smoothly interpolates an instance's properties from their current values to target values. Give it the instance, the time, the easing style, and a table of target properties.", "examples": [{"code": "local TweenService = game:GetService(\"TweenService\")\n\nlocal part = workspace.Part\n\nlocal info = TweenInfo.new(\n    2,                              -- duration in seconds\n    Enum.EasingStyle.Quad,          -- shape of the motion\n    Enum.EasingDirection.Out        -- start fast, ease out\n)\n\nlocal goal = { Position = Vector3.new(0, 20, 0) }\n\nlocal tween = TweenService:Create(part, info, goal)\ntween:Play()", "out": "(part smoothly moves to y=20 over 2 seconds)"}], "why": "Smooth motion makes games feel alive. UI fading, parts sliding, doors opening, color transitions. TweenService handles them without manual frame-by-frame work.", "questions": [{"type": "choice", "prompt": "What does TweenService:Create return?", "choices": ["The animated value", "A Tween object you call :Play on", "The Instance", "A number"], "answer": 1, "explain": "Create returns a Tween. Call :Play() on it (or :Cancel, :Pause)."}], "recap": "TweenService animates properties smoothly. Create(instance, TweenInfo, goal), then :Play()."}, {"id": "l88", "number": 88, "title": "UserInputService — Reading Input", "teaches": "Reacting to player input on the client.", "idea": "UserInputService fires events for every input: keyboard, mouse, touch, gamepad. Connect to its events from a LocalScript to handle input. Main events: `InputBegan` (input started), `InputEnded` (input released), `InputChanged` (input moved or value changed).", "examples": [{"code": "-- LocalScript\nlocal UIS = game:GetService(\"UserInputService\")\n\nUIS.InputBegan:Connect(function(input, gameProcessed)\n    if gameProcessed then return end    -- ignore typing in chat etc.\n    \n    if input.KeyCode == Enum.KeyCode.Space then\n        print(\"Player pressed space\")\n    end\nend)", "out": "(triggers on space)"}], "why": "Custom controls, hotkeys, gestures. UserInputService is the foundation for almost every player-input feature.", "note": "The `gameProcessed` argument is true when Roblox has already handled the input (player typing in chat, for instance). Almost always return early when gameProcessed is true.", "questions": [{"type": "choice", "prompt": "Where do you put UserInputService code?", "choices": ["ServerScriptService", "LocalScript", "ModuleScript", "Workspace"], "answer": 1, "explain": "Input is per-player. UserInputService works only on the client (LocalScript)."}, {"type": "choice", "prompt": "Why check `gameProcessed` and return early?", "choices": ["Faster", "Avoid acting on inputs already handled by Roblox (e.g. chat typing)", "Required syntax", "Disables errors"], "answer": 1, "explain": "If the player is typing in chat, you don't want your key handlers to fire too."}], "recap": "UserInputService for client input. Check gameProcessed. Use Enum.KeyCode constants."}, {"id": "l89", "number": 89, "title": "RunService — Heartbeat, Stepped, RenderStepped", "teaches": "Per-frame and per-step events.", "idea": "RunService fires events on every game step. `Heartbeat` fires every server step (about 60Hz). `Stepped` fires before physics each step. `RenderStepped` fires on the client every frame before rendering. Connecting to these is how you run code every frame.", "examples": [{"code": "local RunService = game:GetService(\"RunService\")\n\nRunService.Heartbeat:Connect(function(deltaTime)\n    -- Runs about 60 times per second on the server.\n    -- deltaTime = how many seconds since the last call.\nend)", "out": "(runs continuously)"}, {"code": "-- LocalScript only:\nlocal RunService = game:GetService(\"RunService\")\n\nRunService.RenderStepped:Connect(function(deltaTime)\n    -- Runs every frame, just before the screen renders.\n    -- Use this for camera updates and other visual code.\nend)", "out": "(runs every frame)"}], "why": "Smooth movement, custom physics, camera control, game loops. Anything that needs to happen many times per second uses one of these:\n• Heartbeat: general per-step work, server or client.\n• Stepped: pre-physics work.\n• RenderStepped: client-only, for camera and pre-render UI.", "note": "These handlers fire extremely often. Heavy work inside them tanks frame rate. Keep the body short.", "questions": [{"type": "choice", "prompt": "Which event is client-only?", "choices": ["Heartbeat", "Stepped", "RenderStepped", "PlayerAdded"], "answer": 2, "explain": "RenderStepped fires only on the client, before each frame is rendered."}, {"type": "choice", "prompt": "What argument do these events provide?", "choices": ["The frame number", "deltaTime (seconds since last call)", "Nothing", "The player"], "answer": 1, "explain": "deltaTime is essential for time-based movement: position += velocity * deltaTime."}], "recap": "Heartbeat (server/client general), Stepped (pre-physics), RenderStepped (client per-frame). Keep handlers small."}, {"id": "l90", "number": 90, "title": "Vector3, CFrame, Color3 — The Math Types", "teaches": "Roblox value types for positions, rotations, and colors.", "idea": "Roblox provides special value types for game math. **Vector3** is a 3D point or direction. **CFrame** combines position and rotation. **Color3** is an RGB color with values from 0 to 1.", "examples": [{"code": "-- Vector3\nlocal pos = Vector3.new(10, 5, -3)\nprint(pos.X, pos.Y, pos.Z)\nprint(pos.Magnitude)  -- length of the vector\n\n-- Vector math\nlocal a = Vector3.new(1, 0, 0)\nlocal b = Vector3.new(0, 1, 0)\nprint(a + b)  -- (1, 1, 0)", "out": "10 5 -3\n11.5758...\n1, 1, 0"}, {"code": "-- CFrame combines position and rotation\nlocal cf = CFrame.new(0, 10, 0)         -- position 10 up\nlocal rotated = CFrame.Angles(0, math.rad(90), 0)  -- 90deg yaw\n\nworkspace.Part.CFrame = cf * rotated", "out": "(positions the part)"}, {"code": "-- Color3 — values are 0 to 1\nlocal red = Color3.new(1, 0, 0)\nlocal halfGreen = Color3.fromRGB(0, 128, 0)  -- helper for 0-255 values\n\nworkspace.Part.Color = red", "out": "(part becomes red)"}], "why": "Most properties on 3D instances involve these types. Position is a Vector3. Orientation plus position is a CFrame. Colors are Color3. Knowing the basics unlocks the rest of the API.", "note": "Vector3.Magnitude is the length. Vector3s can be added, subtracted, multiplied by a number. CFrames multiply to combine transformations. Color3.fromRGB(0-255) is friendlier than the raw 0-1 form.", "questions": [{"type": "choice", "prompt": "Which type describes both position and rotation?", "choices": ["Vector3", "CFrame", "Color3", "Position"], "answer": 1, "explain": "CFrame = Coordinate Frame. Position plus orientation in one value."}, {"type": "predict", "prompt": "What does this print?", "code": "local a = Vector3.new(3, 0, 4)\nprint(a.Magnitude)", "answer": ["5"], "explain": "sqrt(3^2 + 4^2) = sqrt(25) = 5. The classic 3-4-5 triangle."}], "recap": "Vector3 = point/direction. CFrame = position+rotation. Color3 = RGB color. These show up everywhere in 3D code."}], "review": {"title": "Module 6 Checkpoint", "blurb": "The Roblox-specific topics. Make sure these stick. They show up in every script you'll write.", "questions": [{"type": "choice", "prompt": "Server-only script container?", "choices": ["ReplicatedStorage", "ServerScriptService", "Workspace", "StarterGui"], "answer": 1, "explain": "ServerScriptService. (Lesson 78)"}, {"type": "choice", "prompt": "Recommended way to access ReplicatedStorage?", "choices": ["game.ReplicatedStorage", "game:GetService(\"ReplicatedStorage\")", "_G.ReplicatedStorage", "Either is the same"], "answer": 1, "explain": "GetService is reliable. (Lesson 77)"}, {"type": "choice", "prompt": "Modern preferred way to pause for 1 second?", "choices": ["wait(1)", "task.wait(1)", "sleep(1)", "delay(1)"], "answer": 1, "explain": "task.wait. Non-throttling, modern. (Lesson 83)"}, {"type": "choice", "prompt": "First argument the server receives when a client fires a RemoteEvent?", "choices": ["whatever the client sent", "the player object (set automatically by Roblox)", "the remote's Name", "nil"], "answer": 1, "explain": "Player is always added. The client can't fake it. (Lesson 84)"}, {"type": "choice", "prompt": "Which event is client-only and fires once per frame before rendering?", "choices": ["Heartbeat", "Stepped", "RenderStepped", "PlayerAdded"], "answer": 2, "explain": "RenderStepped. (Lesson 89)"}, {"type": "choice", "prompt": "Which RemoteFunction method does the client use to call the server?", "choices": ["FireServer", "InvokeServer", "CallServer", "AskServer"], "answer": 1, "explain": "InvokeServer yields and returns a value. (Lesson 85)"}, {"type": "choice", "prompt": "Why never trust the client?", "choices": ["Lag", "Style", "The player can modify or fake any client data", "Security through obscurity"], "answer": 2, "explain": "The client runs on the player's machine and can be modified. Validate on the server. (Lesson 86)"}]}}, {"id": "m7", "number": 7, "title": "Capstone Projects", "subtitle": "Lessons 91-96 · Putting It All Together", "hours": 16, "intro": "Six small, working systems built from everything covered so far. Read each one. Predict what it does. Then try writing your own version in Studio. Building real things is where it starts to click.", "lessons": [{"id": "l91", "number": 91, "title": "Project — Leaderstats (Coins Per Player)", "teaches": "Per-player data and the standard leaderstats pattern.", "idea": "A folder named `leaderstats` parented to a player gets its NumberValue and IntValue children shown on the in-game leaderboard automatically. Set this up in PlayerAdded.", "examples": [{"code": "-- Server: ServerScriptService > LeaderstatsSetup\nlocal Players = game:GetService(\"Players\")\n\nPlayers.PlayerAdded:Connect(function(player)\n    local stats = Instance.new(\"Folder\")\n    stats.Name = \"leaderstats\"\n    stats.Parent = player\n\n    local coins = Instance.new(\"IntValue\")\n    coins.Name = \"Coins\"\n    coins.Value = 0\n    coins.Parent = stats\nend)", "out": "(coins column appears on the leaderboard)"}], "why": "Almost every Roblox game has a leaderboard. This is the canonical pattern. It also shows how Instance.new + Parent + PlayerAdded work together.", "questions": [{"type": "choice", "prompt": "What must the folder containing leaderboard values be named?", "choices": ["stats", "scoreboard", "leaderstats", "playerData"], "answer": 2, "explain": "Roblox specifically looks for a folder named 'leaderstats' to populate the in-game leaderboard."}, {"type": "choice", "prompt": "Where should this script live?", "choices": ["ReplicatedStorage", "ServerScriptService", "StarterPlayerScripts", "Workspace"], "answer": 1, "explain": "Server logic = ServerScriptService."}], "recap": "leaderstats folder on the Player. IntValue/NumberValue children show up on the leaderboard."}, {"id": "l92", "number": 92, "title": "Project — Click a Part to Earn Coins", "teaches": "ClickDetector, server-side validation, and updating leaderstats.", "idea": "A Part with a ClickDetector fires `MouseClick` when a player clicks it, passing the player as the argument. From that you can update their leaderstats. All on the server.", "examples": [{"code": "-- Server script: place inside the coin Part, or in ServerScriptService\nlocal coinPart = workspace:WaitForChild(\"CoinPart\")\nlocal clickDetector = coinPart:WaitForChild(\"ClickDetector\")\n\nclickDetector.MouseClick:Connect(function(player)\n    local stats = player:FindFirstChild(\"leaderstats\")\n    if not stats then return end\n\n    local coins = stats:FindFirstChild(\"Coins\")\n    if not coins then return end\n\n    coins.Value = coins.Value + 1\nend)", "out": "(clicking the part awards 1 coin)"}], "why": "Combines five things you know: events, services, FindFirstChild for defensive nil checks, server-side authority, leaderstats.", "note": "Defensive pattern: get the folder, check it exists; get the value, check it exists. If anything is missing, return quietly. The script stays robust even when the player object isn't fully set up.", "questions": [{"type": "choice", "prompt": "Which event fires when a player clicks a ClickDetector?", "choices": ["Touched", "MouseClick", "OnClick", "ClickEvent"], "answer": 1, "explain": "Clic
